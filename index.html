    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1});
    // Header: CNPJ(0) CNPJ2(1) IE(2) CLIENTE(3) APELIDO(4) ENDEREÇO(5) CEP(6) CIDADE(7) ESTADO(8) REGIOES(9) SEGMENTO(10) VENDEDOR(11) CONTATO(12) DEPT(13) TEL(14) CEL(15) EMAIL(16)
    const dict = {};
    for (let i=1; i<rows.length; i++) {
      const row = rows[i];
      if (!row || !row.length) continue;
      const cnpj=String(row[0]||"").trim(), cnpj2=String(row[1]||"").trim(), ie=String(row[2]||"").trim();
      const cliente=String(row[3]||"").trim(), apelido=String(row[4]||"").trim()||cliente;
      const endereco=String(row[5]||"").trim(), cep=String(row[6]||"").trim();
      const cidade=String(row[7]||"").trim(), estado=String(row[8]||"").trim();
      const regiao=String(row[9]||"").trim(), segmento=String(row[10]||"").trim();
      const contato=String(row[12]||"").trim(), dept=String(row[13]||"").trim();
      const tel=String(row[14]||"").trim(), cel=String(row[15]||"").trim(), email=String(row[16]||"").trim();
      if (!apelido) continue;
      if (!dict[apelido]) dict[apelido]={alias:apelido,name:cliente,cnpj,cnpj2,ie,address:endereco,cep,city:cidade,state:estado,region:regiao,segment:segmento,contacts:[]};
      if (contato) dict[apelido].contacts.push({name:contato,role:dept,tel,cel,email});
    }
    const list = Object.values(dict);

  async function importOrcamentoXLSX(e) {
    const file = e.target.files[0];
    if (!file) return;
    const XLSX = window.XLSX;
    if (!XLSX) { alert("Aguarde o carregamento do leitor de planilhas."); return; }
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});

    // Estrutura da planilha Sinuelo:
    // Linha 14 (idx 13): cabeçalhos de grupo
    // Linha 15 (idx 14): cabeçalhos de coluna
    // Linhas 17+ (idx 16+): itens (col A=item, E=qtd, F=desc, G=codigo, H=sigma, J=entrega, L=preco_unit, T=val_liq_unit)
    // Linha TOTAL: L="Valor total com ICMS", M=valor

    // Detectar itens (coluna A = número sequencial)
    const items = [];
    let totalComICMS = 0;
    let totalComIPI  = 0;
    let foundTotal   = false;

    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      if (!row || !row.length) continue;

      // Linha de item: col A é número 1-99
      const itemNum = row[0];
      if (typeof itemNum === 'number' && itemNum >= 1 && itemNum <= 99) {
        const qtd         = Number(row[4])  || 1;
        const desc        = String(row[5]  || '').trim();
        const codigo      = String(row[6]  || '').trim();
        const sigma       = String(row[7]  || '').trim();
        const entrega     = String(row[9]  || '').trim();
        const preco_unit  = Number(row[11]) || 0;
        const val_liq_unit= Number(row[19]) || 0;  // coluna T (índice 19)
        const total_liq   = val_liq_unit * qtd;
        items.push({item:itemNum, qtd, desc, codigo, sigma, entrega, preco_unit:+preco_unit.toFixed(2), val_liq_unit:+val_liq_unit.toFixed(2), total_liq:+total_liq.toFixed(2)});
      }

      // Linha de totais: col L = "Valor total com ICMS"
      const colL = String(row[11] || '').toLowerCase();
      if (colL.includes('valor total com icms')) {
        totalComICMS = Number(row[12]) || 0;
        foundTotal = true;
      }
      if (colL.includes('valor total com ipi') && !colL.includes('difal')) {
        totalComIPI = Number(row[12]) || 0;
      }
      // Também captura totais das colunas W/X (índices 22/23)
      if (typeof row[22] === 'number' && row[22] > 0 && !totalComIPI) totalComIPI  = row[22];
      if (typeof row[23] === 'number' && row[23] > 0) totalComIPI = Math.max(totalComIPI, row[23]);
    }

    if (items.length === 0) {
      alert("Nenhum item encontrado na planilha. Verifique se o formato é o padrão Sinuelo.");
      e.target.value = "";
      return;
    }

    // Usar valor com ICMS como valor do pipeline (célula amarela padrão)
    const valorPipeline = totalComICMS || items.reduce((s,it)=>s+(it.total_liq||0),0);

    // Extrair número do orçamento do nome do arquivo
    // Ex: MO_JACTO5LUCAS_SIQUEIRA_MO21790_26EF.xlsx → MO21790_26EF
    const fname = file.name.replace('.xlsx','').replace('.xls','');
    const orcNum = fname.split('_').slice(-2).join('_') || fname;

    // Tentar deduzir cliente e contato do nome do arquivo
    // Formato: MO_CLIENTE_CONTATO_NUMERO.xlsx
    const parts = fname.split('_');
    const clienteGuess = parts[1] || '';
    const contatoGuess = parts.slice(2, parts.length-2).join(' ') || '';

    const newOrc = {
      id: Date.now().toString(),
      number: orcNum,
      client: clienteGuess,
      contact: contatoGuess,
      supplier: 'Momento',
      value: +valorPipeline.toFixed(2),
      valueComIPI: +totalComIPI.toFixed(2),
      valueComICMS: +totalComICMS.toFixed(2),
      date: new Date().toISOString().slice(0,10),
      status: 'aberto',
      oppId: '',
      notes: `${items.length} itens importados. Valor pipeline = R$ ${valorPipeline.toLocaleString('pt-BR',{minimumFractionDigits:2})} (com ICMS).`,
      fileName: file.name,
      items
    };

    // Abrir modal pré-preenchido para o usuário confirmar/ajustar antes de salvar
    setOrcForm(newOrc);
    setOrcModal(true);
    e.target.value = "";
  }

  // VISITA MODAL (follow-up detalhado / histórico)
  const [visitaModal, setVisitaModal] = useState(false);
  const [visitaOpp, setVisitaOpp] = useState(null);
  const [visitaForm, setVisitaForm] = useState({date:"",summary:"",what:"",why:"",who:"",where:"",when:"",how:"",howMuch:"",nextStep:""});
  function openVisita(opp){ setVisitaOpp(opp); setVisitaForm({date:new Date().toISOString().slice(0,10),summary:"",what:"",why:"",who:"",where:"",when:"",how:"",howMuch:"",nextStep:""}); setVisitaModal(true); }
  function saveVisita(){
    if(!visitaOpp||!visitaForm.summary) return;
    const entry = {...visitaForm, id:Date.now(), createdAt: visitaForm.date || new Date().toISOString().slice(0,10)};
    const hist = [...(visitaOpp.visitHistory||[]), entry];
    updateOpp({...visitaOpp, visitHistory:hist, nextAction: visitaForm.nextStep||visitaOpp.nextAction, nextDate: visitaForm.when||visitaOpp.nextDate});
    setVisitaModal(false);
    setVisitaOpp(null);
  }

  // RELATÓRIO SEMANAL
  const [relSelected, setRelSelected] = useState([]);
  const [relText, setRelText] = useState("");
  const [relLoading, setRelLoading] = useState(false);
  const [relWeekFilter, setRelWeekFilter] = useState("all");
  function toggleRelOpp(id){ setRelSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]); setRelText(""); }
  async function gerarRelatorio(){
    if(!apiKey||relSelected.length===0) return;
    setRelLoading(true); setRelText("");
    const selOpps = opps.filter(o=>relSelected.includes(o.id));
    const blocksText = selOpps.map(o=>{
      const hist = (o.visitHistory||[]);
      const lastVisit = hist.length>0?hist[hist.length-1]:null;
      return `CLIENTE: ${o.company}\nCONTATO: ${o.contact||"—"}\nOPORTUNIDADE: ${o.title}${o.supplier?" ("+o.supplier+")":""}\nVALOR: R$ ${(o.value||0).toLocaleString("pt-BR")}\nETAPA: ${o.stage}\nÚLTIMO FOLLOW-UP: ${o.nextAction||"—"}\nHISTÓRICO ÚLTIMA VISITA: ${lastVisit?JSON.stringify(lastVisit):"sem registro"}`;
    }).join("\n\n---\n\n");
    const prompt = `Você é um assistente comercial B2B industrial. Com base nas informações abaixo, gere um relatório semanal de visitas e oportunidades comerciais em português. Para cada oportunidade use EXATAMENTE este formato:\n\nCLIENTE: [nome]\nCONTATO: [nome do contato responsável pela oportunidade]\nOPORTUNIDADE: [descrição]\nRESUMO:\n* [tópico 1]\n* [tópico 2]\n* [tópico 3]\nPRÓXIMO PASSO: [próximo passo claro e datado]\n\nSepare cada oportunidade com uma linha em branco. Seja objetivo, profissional e direto. Use os dados de histórico de visita (5W2H) quando disponíveis.\n\nDADOS:\n\n${blocksText}`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-opus-4-5",max_tokens:4000,messages:[{role:"user",content:prompt}]})});
      const data = await res.json();
      setRelText(data.content?.[0]?.text||"Erro ao gerar relatório.");
    } catch(e){ setRelText("Erro de conexão."); }
    setRelLoading(false);
  }

  // TEMA
  const THEME_KEY = "crm_theme_v1";
  const getSystemTheme = () => window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  const [themePref, setThemePref] = useState(() => localStorage.getItem(THEME_KEY) || "light");
  const resolvedTheme = themePref === "system" ? getSystemTheme() : themePref;
  useEffect(() => {
    document.body.classList.remove("theme-dark","theme-light");
    document.body.classList.add("theme-" + (themePref==="system" ? getSystemTheme() : themePref));
    localStorage.setItem(THEME_KEY, themePref);
  }, [themePref]);
  useEffect(() => {
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const handler = () => { if(themePref==="system"){ document.body.classList.remove("theme-dark","theme-light"); document.body.classList.add("theme-"+(mq.matches?"dark":"light")); }};
    mq.addEventListener("change",handler);
    return () => mq.removeEventListener("change",handler);
  }, [themePref]);

  useEffect(() => { saveData(opps); }, [opps]);
  useEffect(() => { aiEnd.current?.scrollIntoView({behavior:"smooth"}); }, [aiMsgs]);

  function setAndSave(list) { setOpps(list); }

  function updateOpp(u) {
    setAndSave(opps.map(o => o.id===u.id ? u : o));
    setSel(u);
  }

  function move(id, dir) {
    const opp = opps.find(o=>o.id===id);
    const idx = STAGES.findIndex(s=>s.id===opp.stage);
    const ni  = idx+dir;
    if (ni<0||ni>=STAGES.length) return;
    const u = {...opp, stage:STAGES[ni].id};
    setAndSave(opps.map(o=>o.id===id?u:o));
    setSel(u);
  }

  function addOpp() {
    if (!form.title||!form.company) return;
    const o = {...form, id:Date.now().toString(), value:Number(form.value)||0, history:[], createdAt:new Date().toISOString().slice(0,10)};
    setAndSave([...opps, o]);
    setNewModal(false);
    setForm({title:"",company:"",contact:"",value:"",stage:"prospeccao",priority:"media",nextAction:"",nextDate:"",nextTime:"",notes:"",supplier:"",resp:"",forecastColor:"none",confidence:0.1,negType:"D"});
  }

  function delOpp(id) { setAndSave(opps.filter(o=>o.id!==id)); setSel(null); }

  function exportData() {
    const blob = new Blob([JSON.stringify(opps,null,2)],{type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download="crm-backup.json"; a.click();
    URL.revokeObjectURL(url);
  }

  async function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const XLSX = window.XLSX;
    if (!XLSX) { alert("Aguarde o carregamento do leitor de planilhas."); return; }
    const fname = file.name.toLowerCase();
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const sheetName = wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});

    // Detectar tipo de planilha pelo nome do arquivo e conteúdo
    const isClientes = fname.includes("cadastro") || fname.includes("cliente") || sheetName.toLowerCase().includes("cliente");
    const isForecast = fname.includes("forecast") || sheetName.toLowerCase().includes("forecast") || sheetName.toLowerCase().includes("pipeline");
    const isBudget   = fname.includes("budget") || sheetName.toLowerCase().includes("budget");

    if (isClientes) {
      // Importar clientes — mesmo parser do botão dedicado
      const dict = {};
      for (let i=1; i<rows.length; i++) {
        const row = rows[i]; if (!row || !row.length) continue;
        const cliente=String(row[3]||"").trim(), apelido=String(row[4]||"").trim()||cliente;
        if (!apelido) continue;
        if (!dict[apelido]) dict[apelido]={alias:apelido,name:cliente,cnpj:String(row[0]||"").trim(),address:String(row[5]||"").trim(),cep:String(row[6]||"").trim(),city:String(row[7]||"").trim(),state:String(row[8]||"").trim(),region:String(row[9]||"").trim(),segment:String(row[10]||"").trim(),contacts:[]};
        const contato=String(row[12]||"").trim();
        if(contato) dict[apelido].contacts.push({name:contato,role:String(row[13]||"").trim(),tel:String(row[14]||"").trim(),cel:String(row[15]||"").trim(),email:String(row[16]||"").trim()});
      }
      const list = Object.values(dict);
      saveClients(list);
      alert(list.length+" clientes importados com sucesso!");
    } else if (isForecast) {
      // Importar forecast — colunas: NEGOCIAÇÃO|RESP.|CUSTOMER|SUPPLIER|DESCRIPTION|AMOUNT|UF|Confidence|...
      const newOpps = [];
      for (let i=1; i<rows.length; i++) {
        const row = rows[i]; if (!row || !row.length || !row[2]) continue;
        newOpps.push({
          id: Date.now().toString()+i,
          negType: String(row[0]||"D").trim(),
          resp: String(row[1]||"").trim(),
          company: String(row[2]||"").trim(),
          supplier: String(row[3]||"").trim(),
          title: String(row[4]||"").trim(),
          value: Number(row[5])||0,
          stage: "qualificacao",
          priority: "media",
          forecastColor: "none",
          nextAction: String(row[12]||"").trim(),
          nextDate: "", nextTime: "",
          contact: String(row[13]||"").trim(),
          notes: "",
          months: {},
          history: [], visitHistory: [],
          createdAt: new Date().toISOString().slice(0,10)
        });
      }
      if(window.confirm("Importar "+newOpps.length+" oportunidades? Isso substituirá o pipeline atual.")) {
        setAndSave(newOpps);
        alert(newOpps.length+" oportunidades importadas!");
      }
    } else {
      alert("Planilha não reconhecida automaticamente.
Nomeie o arquivo com 'clientes', 'forecast' ou 'budget' para importação automática.

Arquivo: "+file.name);
    }
    e.target.value="";
  }

  function saveKey() {
    localStorage.setItem(KEY_STORE, keyDraft);
    setApiKey(keyDraft);
    setShowKey(false);
  }

  async function chat(msg) {
    const m = msg||aiInput;
    if (!m.trim()||aiLoading) return;
    if (!apiKey) { setKeyDraft(""); setShowKey(true); return; }
    const ctx = sel
      ? `Oportunidade: "${sel.title}" | Empresa: ${sel.company} | Etapa: ${STAGES.find(s=>s.id===sel.stage)?.label} | Valor: R$ ${(sel.value||0).toLocaleString("pt-BR")} | Próxima ação: ${sel.nextAction} | Notas: ${sel.notes}`
      : "Nenhuma oportunidade selecionada.";
    const msgs = [...aiMsgs, {role:"user",content:m}];
    setAiMsgs(msgs);
    setAiInput("");
    setAiLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:SYS_PROMPT,
          messages:[...msgs.slice(0,-1),{role:"user",content:`${m}\n\nContexto: ${ctx}`}]
        })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error.message);
      const reply = d.content?.map(c=>c.text||"").join("")||"Sem resposta.";
      setAiMsgs([...msgs,{role:"assistant",content:reply}]);
    } catch(err) {
      setAiMsgs([...msgs,{role:"assistant",content:`Erro: ${err.message}`}]);
    }
    setAiLoading(false);
  }

  function openAI(prompt) {
    if (!apiKey) { setKeyDraft(""); setShowKey(true); return; }
    setAiOpen(true);
    if (aiMsgs.length===0) setAiMsgs([{role:"assistant",content:"Olá! Sou seu Gestor IA. Selecione uma oportunidade e me pergunte sobre próximos passos, argumentos NOMUDA, torque, estratégia 3S+M, plano 5W2H ou Kaizen para o cliente."}]);
    if (prompt) setTimeout(()=>chat(prompt),150);
  }

  const today    = new Date().toISOString().slice(0,10);
  const totalVal = opps.reduce((s,o)=>s+(o.value||0),0);
  const wonVal   = opps.filter(o=>o.stage==="pos_venda").reduce((s,o)=>s+(o.value||0),0);
  const overdue  = opps.filter(o=>o.nextDate&&o.nextDate<today).length;
  const highPri  = opps.filter(o=>o.priority==="alta").length;

  const inp = {width:"100%",fontSize:"12px",padding:"7px 9px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-input)",color:"var(--text-primary)",boxSizing:"border-box"};
  const lbl = {fontSize:"11px",color:"var(--text-secondary)",marginBottom:"3px",display:"block",textTransform:"uppercase",letterSpacing:"0.05em"};
  const btn = (bg,tc,bc) => ({padding:"6px 12px",fontSize:"12px",borderRadius:"6px",border:`1px solid ${bc||bg}`,background:bg,color:tc,cursor:"pointer",fontWeight:500});

  return (
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"var(--text-primary)",background:"var(--bg-app)",minHeight:"100vh"}}>

      {/* HEADER */}
      <div style={{background:"var(--bg-header)",borderBottom:"1px solid var(--border2)",padding:"10px 16px",display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap",position:"sticky",top:0,zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flex:1,minWidth:"160px"}}>
          <div style={{flexShrink:0}}>
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="28" height="28" rx="6" fill="#8C1A1A"/>
              <circle cx="14" cy="14" r="8" stroke="#FFD0D0" strokeWidth="1.5" fill="none"/>
              <circle cx="14" cy="14" r="4" stroke="#FFD0D0" strokeWidth="1.5" fill="none"/>
              <circle cx="14" cy="14" r="1.5" fill="#FFD0D0"/>
              <line x1="14" y1="4" x2="14" y2="9" stroke="#FFD0D0" strokeWidth="1.5" strokeLinecap="round"/>
              <line x1="14" y1="19" x2="14" y2="24" stroke="#FFD0D0" strokeWidth="1.5" strokeLinecap="round"/>
              <line x1="4" y1="14" x2="9" y2="14" stroke="#FFD0D0" strokeWidth="1.5" strokeLinecap="round"/>
              <line x1="19" y1="14" x2="24" y2="14" stroke="#FFD0D0" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
          <span style={{fontWeight:700,fontSize:"15px",color:"var(--text-primary)",letterSpacing:"0.02em"}}>FORECAST-CRM</span>

        </div>
        <div style={{display:"flex",gap:"4px"}}>
          {[["kanban","Pipeline/Forecast"],["tasks","Tarefas"],["clients","Clientes"],["relatorio","Relatório"],["posvendas","Pós-venda"],["budget","Budget"],["orcamentos","Orçamentos"],["projetos","Projetos"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setView(v);if(v!=="kanban")setSel(null);}} style={{padding:"5px 11px",fontSize:"12px",borderRadius:"6px",border:"1px solid",borderColor:view===v?"#8C1A1A":"var(--border)",background:view===v?"rgba(140,26,26,0.25)":"transparent",color:view===v?"#FFAAAA":"#B0A0A0",cursor:"pointer",fontWeight:view===v?600:400,position:"relative"}}>
              {l}
              {v==="tasks"&&tasks.filter(t=>!t.done&&t.date===today).length>0&&<span style={{position:"absolute",top:"-4px",right:"-4px",background:"#E24B4A",color:"#fff",borderRadius:"50%",width:"14px",height:"14px",fontSize:"8px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{tasks.filter(t=>!t.done&&t.date===today).length}</span>}
            </button>
          ))}
        </div>
        <button onClick={()=>setNewModal(true)} style={btn("#E1F5EE","#085041","#0F6E56")}>+ Nova oportunidade</button>
        <button onClick={()=>openAI(null)} style={btn("#EEEDFE","#3C3489","#534AB7")}>Gestor IA</button>
        <button onClick={exportData} style={btn("#f5f5f3","#555","#ddd")} title="Exportar backup">↓ Backup</button>
        <label style={{...btn("#f5f5f3","#555","#ddd"),cursor:"pointer"}} title="Importar planilha XLSX (clientes, forecast, budget...)">↑ Importar planilha<input type="file" accept=".xlsx,.xls" onChange={importData} style={{display:"none"}}/></label>

        <button onClick={()=>setShowSettings(true)} title="Configurações" style={{width:"32px",height:"32px",borderRadius:"8px",border:"1px solid var(--border)",background:"var(--bg-card2)",cursor:"pointer",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-secondary)"}}>⚙</button>
        <button onClick={()=>setShowProfile(true)} title={profile.userName||"Perfil"} style={{width:"34px",height:"34px",borderRadius:"50%",border:"2px solid #8C1A1A",background:"#8C1A1A",cursor:"pointer",overflow:"hidden",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
          {profile.photo ? <img src={profile.photo} style={{width:"34px",height:"34px",objectFit:"cover"}} alt="perfil"/> : <span style={{fontSize:"11px",fontWeight:700,color:"#FFD0D0",pointerEvents:"none"}}>{(profile.userName||"U").split(" ").map(w=>w[0]).slice(0,2).join("")}</span>}
        </button>
      </div>

      {/* MÉTRICAS */}
      <div style={{background:"var(--bg-card2)",borderBottom:"1px solid var(--border)",padding:"8px 16px",display:"flex",gap:"20px",flexWrap:"wrap"}}>
        {[
          {l:"Pipeline total", v:`R$ ${(totalVal/1000).toFixed(0)}k`},
          {l:"Em pós-venda",   v:`R$ ${(wonVal/1000).toFixed(0)}k`},
          {l:"Oportunidades",  v:opps.length},
          {l:"Alta prioridade",v:highPri, warn:highPri>0},
          {l:"Atrasados",      v:overdue, warn:overdue>0},
        ].map((m,i)=>(
          <div key={i} style={{display:"flex",gap:"5px",alignItems:"baseline"}}>
            <span style={{fontSize:"15px",fontWeight:600,color:m.warn?"#FF6B6B":"#F0EDED"}}>{m.v}</span>
            <span style={{fontSize:"11px",color:"var(--text-secondary)"}}>{m.l}</span>
          </div>
        ))}
      </div>

      {/* CORPO */}
      <div style={{padding:"12px 16px",display:"flex",gap:"12px",alignItems:"flex-start"}}>

        {/* KANBAN */}
        {view==="kanban" && (
          <div style={{flex:1,minWidth:0}}>
            {/* Toolbar: toggle kanban/linhas + filtros */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"10px",flexWrap:"wrap"}}>
              <div style={{display:"flex",gap:"2px",background:"rgba(128,128,128,0.12)",borderRadius:"8px",padding:"3px"}}>
                {[["kanban","⊞ Kanban"],["lines","≡ Linhas"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setPipeView(v)} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"6px",border:"none",cursor:"pointer",background:pipelineView===v?"#8C1A1A":"transparent",color:pipelineView===v?"#fff":"var(--text-secondary)",fontWeight:pipelineView===v?700:400,transition:"all .15s"}}>{l}</button>
                ))}
              </div>
              {pipelineView==="lines" && (
                <>
                  <select value={forecastFilter} onChange={e=>setForecastFilter(e.target.value)} style={{fontSize:"11px",padding:"4px 8px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-input)",color:"var(--text-primary)",cursor:"pointer"}}>
                    <option value="todos">Todas etapas</option>
                    {STAGES.map(s=><option key={s.id} value={s.id}>{s.tag} {s.label}</option>)}
                    <option value="yellow">🟡 Devemos ao cliente</option>
                    <option value="red">🔴 Em negociação ativa</option>
                    <option value="gray">⚫ Perdidos</option>
                  </select>
                  <span style={{fontSize:"11px",color:"var(--text-muted)",marginLeft:"4px"}}>
                    {(()=>{
                      const filtered = opps.filter(o=>forecastFilter==="todos"||o.stage===forecastFilter||o.forecastColor===forecastFilter);
                      const tot = filtered.reduce((s,o)=>s+(o.value||0),0);
                      return `${filtered.length} opp · R$ ${tot.toLocaleString("pt-BR")}`;
                    })()}
                  </span>
                </>
              )}
            </div>

            {/* KANBAN */}
            {pipelineView==="kanban" && (
              <div style={{overflowX:"auto"}}>
                <div style={{display:"flex",gap:"8px",paddingBottom:"8px",minWidth:"max-content"}}>
                  {STAGES.map(stage=>{
                    const cols   = opps.filter(o=>o.stage===stage.id);
                    const colVal = cols.reduce((s,o)=>s+(o.value||0),0);
                    return (
                      <div key={stage.id} style={{width:"196px",flexShrink:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"6px"}}>
                          <span style={{fontSize:"10px",fontWeight:600,padding:"2px 7px",borderRadius:"10px",background:stage.color+"22",color:stage.color}}>{stage.tag}</span>
                          <span style={{fontSize:"12px",fontWeight:600,flex:1,color:"var(--text-primary)"}}>{stage.label}</span>

                        </div>
                        {colVal>0 && <div style={{fontSize:"11px",color:"var(--text-muted)",marginBottom:"5px"}}>R$ {(colVal/1000).toFixed(0)}k</div>}
                        <div style={{display:"flex",flexDirection:"column",gap:"6px",minHeight:"60px"}}>
                          {cols.map(opp=>(
                            <div key={opp.id} onClick={()=>setSel(opp===sel?null:opp)}
                              style={{background:"var(--bg-header)",border:`1px solid ${sel?.id===opp.id?stage.color:"var(--border)"}`,borderLeft:`3px solid ${stage.color}`,borderRadius:"0 8px 8px 0",padding:"10px 10px 10px 9px",cursor:"pointer"}}>
                              <div style={{fontSize:"12px",fontWeight:600,marginBottom:"3px",lineHeight:1.3,color:"var(--text-primary)"}}>{opp.title}</div>
                              <div style={{fontSize:"11px",color:"var(--text-secondary)",marginBottom:"7px"}}>{opp.company}</div>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                <span style={{fontSize:"12px",fontWeight:600,color:"var(--text-primary)"}}>R$ {(opp.value/1000).toFixed(0)}k</span>
                                <span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"8px",background:PRI_BG[opp.priority],color:PRI_TXT[opp.priority],fontWeight:600}}>{opp.priority}</span>
                              </div>
                              {opp.nextDate&&opp.nextDate<today && <div style={{fontSize:"10px",color:"#FF7777",marginTop:"5px",fontWeight:600}}>Atrasado · {opp.nextDate}</div>}
                              {opp.nextAction && <div style={{fontSize:"10px",color:"var(--text-secondary)",marginTop:"3px",lineHeight:1.3}}>{opp.nextAction.slice(0,52)}{opp.nextAction.length>52?"…":""}</div>}
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* LINHAS — formato Forecast planilha */}
            {pipelineView==="lines" && (
              <div style={{overflowX:"auto"}}>
                {(()=>{
                  // Gerar colunas de tempo dinâmicas: mês atual, M+1, M+2, semestre
                  const now = new Date();
                  const MONTH_PT = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
                  const semLabel = now.getMonth()<6 ? `1S/${now.getFullYear()}` : `2S/${now.getFullYear()}`;
                  const timeCols = [
                    { key:`m0`, label: MONTH_PT[now.getMonth()],       month: now.getMonth(),   year: now.getFullYear(),   isSem:false },
                    { key:`m1`, label: MONTH_PT[(now.getMonth()+1)%12], month:(now.getMonth()+1)%12, year: now.getMonth()===11?now.getFullYear()+1:now.getFullYear(), isSem:false },
                    { key:`m2`, label: MONTH_PT[(now.getMonth()+2)%12], month:(now.getMonth()+2)%12, year: now.getMonth()>=10?now.getFullYear()+1:now.getFullYear(), isSem:false },
                    { key:`sem`, label: semLabel, month:-1, year: now.getFullYear(), isSem:true },
                  ];
                  function toggleMonth(e, opp, key){
                    e.stopPropagation();
                    const cur = opp.months||{};
                    updateOpp({...opp, months:{...cur,[key]:!cur[key]}});
                  }
                  let rows = [...opps];
                  if(forecastFilter!=="todos") rows = rows.filter(o=>o.stage===forecastFilter||o.forecastColor===forecastFilter);
                  rows.sort((a,b)=>{
                    const stageOrder = ["prospeccao","qualificacao","diagnostico","proposta","neg","po_recebido","fechado"];
                    let av,bv;
                    if(sortCol==="stage") { av=stageOrder.indexOf(a.stage); bv=stageOrder.indexOf(b.stage); }
                    else if(sortCol==="value") { av=a.value||0; bv=b.value||0; }
                    else if(sortCol==="confidence") { av=a.confidence||0; bv=b.confidence||0; }
                    else { av=(a[sortCol]||"").toString().toLowerCase(); bv=(b[sortCol]||"").toString().toLowerCase(); }
                    if(av<bv) return sortDir==="asc"?-1:1;
                    if(av>bv) return sortDir==="asc"?1:-1;
                    return 0;
                  });
                  return (
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px",minWidth:"1100px"}}>
                      <thead>
                        <tr style={{background:"var(--bg-card2)",position:"sticky",top:0,zIndex:5}}>
                          {[["neg","NEG.","36px"],["resp","RESP.","52px"],["company","CUSTOMER","110px"],["supplier","SUPPLIER","80px"],["title","DESCRIPTION","200px"],["value","AMOUNT","88px"],["stage","CONF.","60px"]].map(([key,label,w])=>(
                            <th key={key} onClick={()=>{ if(sortCol===key){setSortDir(d=>d==="asc"?"desc":"asc");}else{setSortCol(key);setSortDir("desc");} }}
                              style={{padding:"7px 8px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:"10px",borderBottom:`1px solid var(--border)`,cursor:"pointer",whiteSpace:"nowrap",width:w,userSelect:"none"}}>
                              {label}{sortCol===key?(sortDir==="asc"?" ↑":" ↓"):""}
                            </th>
                          ))}
                          {/* Colunas de tempo */}
                          {timeCols.map(tc=>(
                            <th key={tc.key} style={{padding:"7px 6px",textAlign:"center",color:tc.isSem?"#5DCAA5":"var(--text-secondary)",fontWeight:600,fontSize:"10px",borderBottom:`1px solid var(--border)`,width:"44px",whiteSpace:"nowrap",borderLeft:`1px solid var(--border2)`}}>
                              {tc.label}
                            </th>
                          ))}
                          {[["nextDate","FOLLOW-UP","180px"],["contact","CONTATOS","90px"]].map(([key,label,w])=>(
                            <th key={key} onClick={()=>{ if(sortCol===key){setSortDir(d=>d==="asc"?"desc":"asc");}else{setSortCol(key);setSortDir("desc");} }}
                              style={{padding:"7px 8px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:"10px",borderBottom:`1px solid var(--border)`,cursor:"pointer",whiteSpace:"nowrap",width:w,userSelect:"none",borderLeft:`1px solid var(--border2)`}}>
                              {label}{sortCol===key?(sortDir==="asc"?" ↑":" ↓"):""}
                            </th>
                          ))}
                          <th style={{padding:"7px 6px",width:"28px"}}></th>
                        </tr>
                        {/* Linha de totais por coluna de tempo */}
                        <tr style={{background:"var(--bg-card2)",borderBottom:`2px solid var(--border)`}}>
                          <td colSpan={7} style={{padding:"4px 8px",fontSize:"10px",color:"var(--text-muted)",fontStyle:"italic"}}>Total previsto →</td>
                          {timeCols.map(tc=>{
                            const tot = rows.filter(o=>(o.months||{})[tc.key]).reduce((s,o)=>s+(o.value||0),0);
                            const cnt = rows.filter(o=>(o.months||{})[tc.key]).length;
                            return (
                              <td key={tc.key} style={{padding:"4px 6px",textAlign:"center",fontSize:"9px",color:tc.isSem?"#5DCAA5":"var(--text-accent)",fontWeight:700,borderLeft:`1px solid var(--border2)`}}>
                                {cnt>0?<><div>{cnt} opp</div><div>R${(tot/1000).toFixed(0)}k</div></>:"—"}
                              </td>
                            );
                          })}
                          <td colSpan={3}></td>
                        </tr>
                      </thead>
                      <tbody>
                        {rows.map(opp=>{
                          const stage = STAGES.find(s=>s.id===opp.stage);
                          const rowBg = opp.forecastColor==="yellow"
                            ? "rgba(239,159,39,0.12)"
                            : opp.forecastColor==="red"
                            ? "rgba(226,75,74,0.12)"
                            : opp.forecastColor==="gray"
                            ? "rgba(95,94,90,0.15)"
                            : "transparent";
                          const dotColor = opp.forecastColor==="yellow"?"#EF9F27":opp.forecastColor==="red"?"#E24B4A":opp.forecastColor==="gray"?"#888780":stage?.color||"#888";
                          const confPct = opp.stage==="fechado"?"100%":opp.stage==="po_recebido"?"90%":opp.stage==="neg"?"80%":opp.stage==="proposta"?"50%":opp.stage==="diagnostico"?"30%":opp.stage==="qualificacao"||opp.stage==="prospeccao"?"10%":"—";
                          const months = opp.months||{};
                          return (
                            <tr key={opp.id} onClick={()=>setSel(opp===sel?null:opp)}
                              style={{background:sel?.id===opp.id?"rgba(140,26,26,0.12)":rowBg,borderBottom:`1px solid var(--border2)`,cursor:"pointer",transition:"background .1s"}}>
                              <td style={{padding:"6px 8px",textAlign:"center"}}>
                                <span style={{fontSize:"11px",fontWeight:700,color:dotColor,background:dotColor+"18",borderRadius:"4px",padding:"1px 5px"}}>{opp.negType||"D"}</span>
                              </td>
                              <td style={{padding:"6px 8px",color:"var(--text-secondary)",whiteSpace:"nowrap",fontSize:"11px"}}>{opp.resp||"EF"}</td>
                              <td style={{padding:"6px 8px",fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap"}}>{opp.company}</td>
                              <td style={{padding:"6px 8px",color:"var(--text-secondary)",whiteSpace:"nowrap",fontSize:"11px"}}>{opp.supplier||"—"}</td>
                              <td style={{padding:"6px 8px",color:"var(--text-primary)",maxWidth:"200px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{opp.title}</td>
                              <td style={{padding:"6px 8px",color:"var(--text-accent)",fontWeight:600,whiteSpace:"nowrap",textAlign:"right",fontSize:"11px"}}>
                                {opp.value?`R$ ${opp.value.toLocaleString("pt-BR")}`:"—"}
                              </td>
                              <td style={{padding:"6px 8px"}}>
                                <span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"8px",background:(stage?.color||"#888")+"22",color:stage?.color||"#888",fontWeight:700}}>{confPct}</span>
                              </td>
                              {/* Colunas de tempo — clicáveis */}
                              {timeCols.map(tc=>{
                                const marked = !!months[tc.key];
                                return (
                                  <td key={tc.key} onClick={e=>toggleMonth(e,opp,tc.key)}
                                    style={{padding:"6px 4px",textAlign:"center",borderLeft:`1px solid var(--border2)`,cursor:"pointer"}}>
                                    {marked
                                      ? <div style={{width:"18px",height:"18px",borderRadius:"4px",background:tc.isSem?"#0F6E56":"#8C1A1A",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                          <span style={{color:"#fff",fontSize:"10px",fontWeight:700,lineHeight:1}}>x</span>
                                        </div>
                                      : <div style={{width:"18px",height:"18px",borderRadius:"4px",border:`1px solid var(--border)`,margin:"0 auto"}}/>
                                    }
                                  </td>
                                );
                              })}
                              <td style={{padding:"6px 8px",color:"var(--text-secondary)",fontSize:"11px",maxWidth:"180px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",borderLeft:`1px solid var(--border2)`}}>{opp.nextAction||"—"}</td>
                              <td style={{padding:"6px 8px",color:"var(--text-secondary)",fontSize:"11px",whiteSpace:"nowrap"}}>{opp.contact||"—"}</td>
                              <td style={{padding:"6px 8px"}}>
                                <div style={{display:"flex",gap:"4px"}}>
                                  <button onClick={e=>{e.stopPropagation();openVisita(opp);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-blue)",fontSize:"12px",padding:"2px"}} title="Registrar visita">📝</button>
                                  <button onClick={e=>{e.stopPropagation();openAI(opp);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"12px",padding:"2px"}} title="IA">⚡</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  );
                })()}
                {opps.length===0 && <div style={{textAlign:"center",padding:"30px 0",color:"var(--text-muted)",fontSize:"13px"}}>Nenhuma oportunidade cadastrada</div>}
              </div>
            )}
          </div>
        )}

        {/* FUNIL */}



        {/* ===== TAREFAS ===== */}
        {view==="tasks" && (
          <div style={{flex:1,minWidth:0}}>
            {/* Toolbar */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px",flexWrap:"wrap"}}>
              <div style={{fontSize:"15px",fontWeight:700,color:"var(--text-primary)",flex:1}}>
                Tarefas
                {tasks.filter(t=>!t.done&&t.date===today).length>0&&
                  <span style={{marginLeft:"8px",fontSize:"11px",padding:"2px 8px",borderRadius:"8px",background:"rgba(226,75,74,0.15)",color:"#E24B4A",fontWeight:600}}>{tasks.filter(t=>!t.done&&t.date===today).length} para hoje</span>}
              </div>
              <input value={taskSearch} onChange={e=>setTaskSearch(e.target.value)} placeholder="Buscar tarefa..."
                style={{...inp,maxWidth:"200px"}}/>

              <button onClick={()=>{setTaskForm(emptyTask);setTaskModal(true);}} style={{padding:"5px 14px",fontSize:"12px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer",fontWeight:600}}>+ Nova tarefa</button>
            </div>

            {/* Alerta campaninha */}
            {bellAlert&&(
              <div style={{background:"rgba(239,159,39,0.15)",border:"1px solid #EF9F27",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"20px"}}>🔔</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"13px",fontWeight:600,color:"#EF9F27"}}>Tarefa em {notifSettings.minutesBefore} min ou menos!</div>
                  <div style={{fontSize:"12px",color:"var(--text-primary)"}}>{bellAlert.title} — {bellAlert.company} · {bellAlert.date} {bellAlert.time}</div>
                </div>
                <button onClick={()=>setBellAlert(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"16px"}}>✕</button>
              </div>
            )}

            {/* Configurações de notificação */}
            <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",gap:"16px",alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:"11px",color:"var(--text-secondary)",fontWeight:600}}>🔔 Notificações:</span>
              <label style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"var(--text-secondary)",cursor:"pointer"}}>
                <input type="checkbox" checked={notifSettings.bellEnabled} onChange={e=>saveNotifSettings({...notifSettings,bellEnabled:e.target.checked})}/>
                Campaninha ativa
              </label>
              <label style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"var(--text-secondary)"}}>
                Alertar com
                <input type="number" value={notifSettings.minutesBefore} onChange={e=>saveNotifSettings({...notifSettings,minutesBefore:Number(e.target.value)||60})}
                  style={{...inp,width:"52px",fontSize:"11px",padding:"2px 6px"}} min="5" max="1440"/>
                min de antecedência
              </label>
            </div>

            {/* Lista de tarefas */}
            {(()=>{
              const tFiltered = tasks
                .filter(t=>!taskSearch||t.title.toLowerCase().includes(taskSearch.toLowerCase())||t.company?.toLowerCase().includes(taskSearch.toLowerCase()))
                .sort((a,b)=>{
                  if(a.done!==b.done) return a.done?1:-1;
                  const da=(a.date||"9999")+(a.time||"");
                  const db=(b.date||"9999")+(b.time||"");
                  return da.localeCompare(db);
                });
              const groups = {};
              tFiltered.forEach(t=>{
                const key = t.done?"✓ Concluídas":(t.date===today?"📅 Hoje":t.date<today&&t.date?"⚠ Atrasadas":"📆 Próximas");
                if(!groups[key]) groups[key]=[];
                groups[key].push(t);
              });
              if(tFiltered.length===0) return <div style={{textAlign:"center",padding:"40px",color:"var(--text-muted)",fontSize:"13px"}}>Nenhuma tarefa cadastrada. Clique em "+ Nova tarefa" para começar.</div>;
              return Object.entries(groups).map(([grp,gtasks])=>(
                <div key={grp} style={{marginBottom:"14px"}}>
                  <div style={{fontSize:"11px",fontWeight:700,color:"var(--text-secondary)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"6px",paddingBottom:"4px",borderBottom:"1px solid var(--border2)"}}>{grp} ({gtasks.length})</div>
                  {gtasks.map(t=>{
                    const isLate = t.date&&t.date<today&&!t.done;
                    const isToday2 = t.date===today;
                    const priC = {alta:"#E24B4A",media:"#EF9F27",baixa:"#1D9E75"}[t.priority]||"#888";
                    const opp = opps.find(o=>o.id===t.oppId);
                    return (
                      <div key={t.id} style={{background:"var(--bg-card)",border:`1px solid ${isLate?"#E24B4A33":isToday2?"#EF9F2733":"var(--border)"}`,borderLeft:`3px solid ${isLate?"#E24B4A":isToday2?"#EF9F27":priC}`,borderRadius:"8px",padding:"10px 12px",marginBottom:"6px",opacity:t.done?.6:1}}>
                        <div style={{display:"flex",alignItems:"flex-start",gap:"10px"}}>
                          <input type="checkbox" checked={t.done} onChange={()=>toggleTaskDone(t.id)} style={{marginTop:"2px",cursor:"pointer",flexShrink:0}}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"2px",flexWrap:"wrap"}}>
                              <span style={{fontSize:"13px",fontWeight:600,color:t.done?"var(--text-muted)":"var(--text-primary)",textDecoration:t.done?"line-through":"none"}}>{t.title}</span>
                              <span style={{fontSize:"10px",padding:"1px 6px",borderRadius:"6px",background:priC+"22",color:priC,fontWeight:600}}>{t.priority}</span>
                              {isLate&&<span style={{fontSize:"10px",color:"#E24B4A",fontWeight:600}}>ATRASADO</span>}
                            </div>
                            <div style={{display:"flex",gap:"10px",fontSize:"11px",color:"var(--text-secondary)",flexWrap:"wrap"}}>
                              {t.company&&<span>🏭 {t.company}</span>}
                              {t.date&&<span>📅 {t.date}{t.time?" "+t.time:""}</span>}
                              {opp&&<span style={{color:"var(--text-blue)",cursor:"pointer"}} onClick={()=>{setSel(opp);setView("kanban");}}>🔗 {opp.title.slice(0,30)}</span>}
                            </div>
                            {t.notes&&<div style={{fontSize:"11px",color:"var(--text-secondary)",marginTop:"4px",lineHeight:1.4}}>{t.notes}</div>}
                          </div>
                          <div style={{display:"flex",gap:"4px",flexShrink:0}}>

                            <button onClick={()=>delTask(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"13px",padding:"2px"}}>✕</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ));
            })()}

            {/* MODAL NOVA TAREFA */}
            {taskModal&&(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60}}>
                <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"12px",padding:"20px",width:"420px",maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                    <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>Nova tarefa</div>
                    <button onClick={()=>setTaskModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"18px"}}>✕</button>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Título *</label>
                    <input value={taskForm.title} onChange={e=>setTaskForm({...taskForm,title:e.target.value})} style={inp} placeholder="Ex: Visita Caterpillar, Enviar proposta Norbar..."/>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Cliente / Empresa</label>
                    <input value={taskForm.company} onChange={e=>setTaskForm({...taskForm,company:e.target.value})} style={inp} placeholder="Ex: Caterpillar"/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
                    <div>
                      <label style={lbl}>Data</label>
                      <input type="date" value={taskForm.date} onChange={e=>setTaskForm({...taskForm,date:e.target.value})} style={inp}/>
                    </div>
                    <div>
                      <label style={lbl}>Horário</label>
                      <input type="time" value={taskForm.time} onChange={e=>setTaskForm({...taskForm,time:e.target.value})} style={inp}/>
                    </div>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Vincular oportunidade</label>
                    <select value={taskForm.oppId} onChange={e=>setTaskForm({...taskForm,oppId:e.target.value,company:e.target.value?opps.find(o=>o.id===e.target.value)?.company||taskForm.company:taskForm.company})} style={{...inp}}>
                      <option value="">— Nenhuma —</option>
                      {opps.filter(o=>o.stage!=="fechado").map(o=><option key={o.id} value={o.id}>{o.company} · {o.title.slice(0,35)}</option>)}
                    </select>
                  </div>
                  <div style={{marginBottom:"8px"}}>
                    <label style={lbl}>Prioridade</label>
                    <div style={{display:"flex",gap:"6px"}}>
                      {[["alta","Alta","#E24B4A"],["media","Média","#EF9F27"],["baixa","Baixa","#1D9E75"]].map(([v,l,c])=>(
                        <button key={v} onClick={()=>setTaskForm({...taskForm,priority:v})}
                          style={{flex:1,padding:"6px",fontSize:"11px",borderRadius:"6px",border:`1px solid ${taskForm.priority===v?c:"var(--border)"}`,background:taskForm.priority===v?c+"22":"transparent",color:taskForm.priority===v?c:"var(--text-secondary)",cursor:"pointer",fontWeight:taskForm.priority===v?600:400}}>{l}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{marginBottom:"14px"}}>
                    <label style={lbl}>Notas / O que oferecer</label>
                    <textarea value={taskForm.notes} onChange={e=>setTaskForm({...taskForm,notes:e.target.value})} style={{...inp,height:"60px"}} placeholder="Produtos a apresentar, contexto, objetivo da visita..."/>
                  </div>
                  <div style={{display:"flex",gap:"8px"}}>
                    <button onClick={addTask} disabled={!taskForm.title}
                      style={{flex:1,padding:"10px",fontSize:"13px",borderRadius:"6px",border:"none",background:taskForm.title?"#8C1A1A":"#4A2A2A",color:taskForm.title?"#FFD0D0":"#7A5050",cursor:taskForm.title?"pointer":"default",fontWeight:600}}>Salvar tarefa</button>
                    <button onClick={()=>setTaskModal(false)} style={{padding:"10px 14px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ===== CLIENTES ===== */}
        {view==="clients" && (
          <div style={{flex:1,minWidth:0}}>
            {/* Toolbar */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px",flexWrap:"wrap"}}>
              <input value={clientSearch} onChange={e=>setClientSearch(e.target.value)}
                placeholder="Buscar cliente, cidade, segmento..."
                style={{...inp,maxWidth:"280px",flex:1}}/>
              <div style={{display:"flex",gap:"2px",background:"rgba(128,128,128,0.12)",borderRadius:"8px",padding:"3px"}}>
                {[["list","≡ Lista"],["kanban","⊞ Cards"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setClientView2(v)} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"6px",border:"none",cursor:"pointer",background:clientView2===v?"#8C1A1A":"transparent",color:clientView2===v?"#fff":"var(--text-secondary)",fontWeight:clientView2===v?700:400}}>{l}</button>
                ))}
              </div>
              <label style={{padding:"5px 12px",fontSize:"11px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-card)",color:"var(--text-secondary)",cursor:"pointer",fontWeight:500}} title="Importar planilha XLSX de clientes">
                ↑ Importar planilha
                <input type="file" accept=".xlsx,.xls" onChange={importClientsXLSX} style={{display:"none"}}/>
              </label>
              <span style={{fontSize:"11px",color:"var(--text-muted)"}}>
                {clientsData.filter(c=>!clientSearch||c.alias?.toLowerCase().includes(clientSearch.toLowerCase())||c.city?.toLowerCase().includes(clientSearch.toLowerCase())||c.segment?.toLowerCase().includes(clientSearch.toLowerCase())).length} clientes
              </span>
            </div>

            {(()=>{
              const filtered = clientsData.filter(c=>!clientSearch||
                c.alias?.toLowerCase().includes(clientSearch.toLowerCase())||
                c.name?.toLowerCase().includes(clientSearch.toLowerCase())||
                c.city?.toLowerCase().includes(clientSearch.toLowerCase())||
                c.segment?.toLowerCase().includes(clientSearch.toLowerCase())||
                c.contacts?.some(ct=>ct.name?.toLowerCase().includes(clientSearch.toLowerCase()))
              );

              if (clientView2==="list") return (
                <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                  {/* Lista de clientes */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",overflow:"hidden"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
                        <thead><tr style={{background:"var(--bg-card2)"}}>
                          {["Cliente","Cidade/UF","Segmento","Contatos","Opp. abertas"].map(h=>(

                        </tr></thead>
                        <tbody>

                            const oppCount = opps.filter(o=>o.company?.toLowerCase().includes(c.alias?.toLowerCase())||o.company===c.alias).length;

                            return (
                              <tr key={c.alias} onClick={()=>setSelClient(sel2?null:c)}
                                style={{borderBottom:"1px solid var(--border2)",cursor:"pointer",background:sel2?"rgba(140,26,26,0.08)":"transparent"}}>
                                <td style={{padding:"8px 10px"}}>
                                  <div style={{fontWeight:600,color:"var(--text-primary)",fontSize:"12px"}}>{c.alias}</div>

                                </td>
                                <td style={{padding:"8px 10px",color:"var(--text-secondary)",whiteSpace:"nowrap"}}>{c.city}/{c.state}</td>
                                <td style={{padding:"8px 10px"}}><span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:"var(--bg-card2)",color:"var(--text-secondary)"}}>{c.segment}</span></td>
                                <td style={{padding:"8px 10px",color:"var(--text-secondary)",textAlign:"center"}}>{c.contacts?.length||0}</td>
                                <td style={{padding:"8px 10px",textAlign:"center"}}>
                                  {oppCount>0?<span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:"rgba(140,26,26,0.15)",color:"var(--text-accent)",fontWeight:600}}>{oppCount}</span>:"—"}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                  {/* Painel detalhe cliente */}
                  {selClient && (
                    <div style={{width:"300px",flexShrink:0,background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"14px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
                        <div>
                          <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)",marginBottom:"2px"}}>{selClient.alias}</div>
                          <div style={{fontSize:"10px",color:"var(--text-secondary)"}}>{selClient.segment}</div>
                        </div>
                        <button onClick={()=>setSelClient(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"16px"}}>✕</button>
                      </div>
                      <div style={{background:"var(--bg-card2)",borderRadius:"6px",padding:"8px 10px",marginBottom:"10px",fontSize:"11px"}}>
                        {[["CNPJ",selClient.cnpj],["Endereço",selClient.address],["Cidade",`${selClient.city}/${selClient.state}`],["CEP",selClient.cep],["Região",selClient.region]].map(([k,v])=>v?(
                          <div key={k} style={{display:"flex",gap:"8px",padding:"3px 0",borderBottom:"1px solid var(--border2)"}}>
                            <span style={{color:"var(--text-secondary)",width:"60px",flexShrink:0}}>{k}</span>
                            <span style={{color:"var(--text-primary)",wordBreak:"break-all"}}>{v}</span>
                          </div>
                        ):null)}
                      </div>
                      {/* Oportunidades abertas */}
                      {(()=>{
                        const clientOpps = opps.filter(o=>o.company?.toLowerCase().includes(selClient.alias?.toLowerCase())||o.company===selClient.alias);
                        if (clientOpps.length===0) return null;
                        return (
                          <div style={{marginBottom:"10px"}}>
                            <div style={{fontSize:"10px",fontWeight:600,color:"var(--text-secondary)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"6px"}}>Oportunidades ({clientOpps.length})</div>
                            {clientOpps.slice(0,4).map(o=>{
                              const stg = STAGES.find(s=>s.id===o.stage);
                              return (
                                <div key={o.id} onClick={()=>{setSel(o);setView("kanban");}} style={{display:"flex",gap:"6px",alignItems:"center",padding:"5px 7px",borderRadius:"5px",background:"var(--bg-card2)",marginBottom:"3px",cursor:"pointer",borderLeft:`2px solid ${stg?.color||"#888"}`}}>
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontSize:"10px",fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.title}</div>
                                    <div style={{fontSize:"9px",color:"var(--text-secondary)"}}>{o.supplier} · {stg?.tag}</div>
                                  </div>
                                  {o.value>0&&<span style={{fontSize:"9px",color:"var(--text-accent)",fontWeight:600,flexShrink:0}}>R${(o.value/1000).toFixed(0)}k</span>}
                                </div>
                              );
                            })}
                            {clientOpps.length>4&&<div style={{fontSize:"10px",color:"var(--text-muted)",textAlign:"right"}}>+{clientOpps.length-4} mais</div>}
                          </div>
                        );
                      })()}
                      {/* Contatos */}
                      <div>
                        <div style={{fontSize:"10px",fontWeight:600,color:"var(--text-secondary)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"6px"}}>Contatos ({selClient.contacts?.length||0})</div>
                        <div style={{maxHeight:"260px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"4px"}}>
                          {(selClient.contacts||[]).map((ct,i)=>(
                            <div key={i} style={{background:"var(--bg-card2)",borderRadius:"6px",padding:"7px 9px"}}>
                              <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-primary)",marginBottom:"2px"}}>{ct.name}</div>
                              {ct.role&&<div style={{fontSize:"10px",color:"var(--text-accent)",marginBottom:"3px"}}>{ct.role}</div>}
                              <div style={{fontSize:"10px",color:"var(--text-secondary)",display:"flex",flexDirection:"column",gap:"1px"}}>
                                {ct.tel&&<span>Tel: {ct.tel}</span>}
                                {ct.cel&&<span>Cel: {ct.cel}</span>}
                                {ct.email&&<a href={`mailto:${ct.email}`} style={{color:"var(--text-blue)"}} onClick={e=>e.stopPropagation()}>{ct.email}</a>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );

              // CARDS VIEW
              return (
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"10px"}}>
                  {filtered.map(c=>{
                    const oppCount = opps.filter(o=>o.company?.toLowerCase().includes(c.alias?.toLowerCase())||o.company===c.alias).length;
                    return (
                      <div key={c.alias} onClick={()=>setSelClient(selClient?.alias===c.alias?null:c)}
                        style={{background:"var(--bg-card)",border:`1px solid ${selClient?.alias===c.alias?"#8C1A1A":"var(--border)"}`,borderRadius:"8px",padding:"12px",cursor:"pointer"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
                          <div style={{fontSize:"13px",fontWeight:700,color:"var(--text-primary)"}}>{c.alias}</div>
                          {oppCount>0&&<span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:"rgba(140,26,26,0.15)",color:"var(--text-accent)",fontWeight:600}}>{oppCount} opp</span>}
                        </div>
                        <div style={{fontSize:"10px",color:"var(--text-secondary)",marginBottom:"4px"}}>{c.city}/{c.state} · {c.segment}</div>
                        <div style={{fontSize:"10px",color:"var(--text-muted)"}}>{c.contacts?.length||0} contatos</div>
                        {c.contacts?.slice(0,2).map((ct,i)=>(
                          <div key={i} style={{fontSize:"10px",color:"var(--text-secondary)",marginTop:"3px",borderTop:"1px solid var(--border2)",paddingTop:"3px"}}>
                            <span style={{fontWeight:600}}>{ct.name}</span>{ct.role?` · ${ct.role.slice(0,30)}`:""}
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        )}

  
        {/* ===== RELATÓRIO SEMANAL ===== */}
        {view==="relatorio" && (
          <div style={{flex:1,display:"flex",gap:"14px",flexWrap:"wrap"}}>
            {/* Coluna esquerda: seleção */}
            <div style={{width:"320px",flexShrink:0}}>
              <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"14px",marginBottom:"10px"}}>
                <div style={{fontSize:"13px",fontWeight:600,color:"var(--text-primary)",marginBottom:"10px"}}>Selecionar oportunidades</div>
                <div style={{display:"flex",gap:"6px",marginBottom:"10px",flexWrap:"wrap"}}>
                  <button onClick={()=>setRelSelected(opps.filter(o=>o.stage!=="fechado").map(o=>o.id))} style={{fontSize:"10px",padding:"3px 9px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-card2)",color:"var(--text-secondary)",cursor:"pointer"}}>Todas abertas</button>
                  <button onClick={()=>setRelSelected([])} style={{fontSize:"10px",padding:"3px 9px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-card2)",color:"var(--text-secondary)",cursor:"pointer"}}>Limpar</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:"4px",maxHeight:"420px",overflowY:"auto"}}>
                  {opps.filter(o=>o.stage!=="fechado").map(o=>{
                    const sel = relSelected.includes(o.id);
                    const stage = STAGES.find(s=>s.id===o.stage);
                    const hasHistory = (o.visitHistory||[]).length>0;
                    return (
                      <div key={o.id} onClick={()=>toggleRelOpp(o.id)}
                        style={{display:"flex",alignItems:"center",gap:"8px",padding:"7px 9px",borderRadius:"6px",background:sel?"rgba(140,26,26,0.12)":"var(--bg-card2)",border:`1px solid ${sel?"#8C1A1A":"var(--border)"}`,cursor:"pointer"}}>
                        <div style={{width:"14px",height:"14px",borderRadius:"3px",border:`2px solid ${sel?"#8C1A1A":"var(--border)"}`,background:sel?"#8C1A1A":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {sel&&<span style={{color:"#fff",fontSize:"9px",lineHeight:1}}>✓</span>}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.company}</div>
                          <div style={{fontSize:"10px",color:"var(--text-secondary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.title}</div>
                        </div>
                        <div style={{display:"flex",gap:"4px",alignItems:"center",flexShrink:0}}>
                          {hasHistory&&<span style={{fontSize:"9px",color:"var(--text-blue)"}}>📝</span>}
                          <span style={{fontSize:"9px",padding:"1px 5px",borderRadius:"6px",background:(stage?.color||"#888")+"22",color:stage?.color||"#888",fontWeight:600}}>{stage?.tag||"—"}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {relSelected.length>0&&(
                  <button onClick={gerarRelatorio} disabled={relLoading||!apiKey}
                    style={{width:"100%",marginTop:"12px",padding:"10px",fontSize:"13px",borderRadius:"6px",border:"none",background:(apiKey&&!relLoading)?"#8C1A1A":"#4A2A2A",color:(apiKey&&!relLoading)?"#FFD0D0":"#7A5050",cursor:(apiKey&&!relLoading)?"pointer":"default",fontWeight:600}}>
                    {relLoading?"Gerando relatório...":!apiKey?"Configure a API Key primeiro":`Gerar relatório (${relSelected.length} opp)`}
                  </button>
                )}
              </div>
            </div>
            {/* Coluna direita: relatório gerado */}
            <div style={{flex:1,minWidth:"300px"}}>
              {relText&&(
                <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                    <div style={{fontSize:"13px",fontWeight:600,color:"var(--text-primary)"}}>Relatório semanal</div>
                    <button onClick={()=>{navigator.clipboard.writeText(relText);}} style={{fontSize:"11px",padding:"4px 12px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-card2)",color:"var(--text-secondary)",cursor:"pointer"}}>Copiar</button>
                  </div>
                  <pre style={{fontSize:"12px",color:"var(--text-primary)",lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>{relText}</pre>
                </div>
              )}
              {!relText&&relSelected.length===0&&(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-muted)"}}>
                  <div style={{fontSize:"32px",marginBottom:"12px"}}>📋</div>
                  <div style={{fontSize:"13px"}}>Selecione as oportunidades à esquerda e clique em Gerar relatório</div>
                </div>
              )}
              {!relText&&relSelected.length>0&&!relLoading&&(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-muted)"}}>
                  <div style={{fontSize:"13px"}}>{relSelected.length} oportunidade(s) selecionada(s). Clique em Gerar relatório.</div>
                </div>
              )}
              {relLoading&&(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-secondary)"}}>
                  <div style={{fontSize:"13px"}}>Gerando relatório com IA...</div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ===== PERFIL ===== */}
        
        {/* ===== BUDGET ===== */}
        {view==="budget" && (
          <div style={{flex:1,minWidth:0}}>

            {/* Toolbar */}
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"14px",flexWrap:"wrap"}}>
              <div style={{fontSize:"15px",fontWeight:700,color:"var(--text-primary)",flex:1}}>Budget {CUR_YEAR}</div>
              <div style={{display:"flex",gap:"2px",background:"rgba(128,128,128,0.12)",borderRadius:"8px",padding:"3px"}}>
                {[["client","Por Cliente"],["supplier","Por Fornecedor"],["matrix","Matriz"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setBudgetView(v)} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"6px",border:"none",cursor:"pointer",background:budgetView===v?"#8C1A1A":"transparent",color:budgetView===v?"#fff":"var(--text-secondary)",fontWeight:budgetView===v?700:400,whiteSpace:"nowrap"}}>{l}</button>
                ))}
              </div>
              <button onClick={()=>setBudgetModal(true)} style={{padding:"5px 14px",fontSize:"12px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer",fontWeight:600}}>+ Nova meta</button>
            </div>

            {/* KPIs globais */}
            {(()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const metaTotal = yr.reduce((s,b)=>s+totalMeta(b),0);
              const realTotal = yr.reduce((s,b)=>s+totalRealizado(b),0);
              const autoTotal = yr.reduce((s,b)=>s+autoRealizado(b),0);
              const pct = metaTotal>0?Math.round(realTotal/metaTotal*100):0;
              const pc  = pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";
              return (
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"16px"}}>
                  {[
                    ["Meta total","R$ "+(metaTotal/1000).toFixed(0)+"k","var(--bg-card2)","var(--border)","var(--text-secondary)","var(--text-primary)"],
                    ["Realizado","R$ "+(realTotal/1000).toFixed(0)+"k","rgba(29,158,117,0.08)","rgba(29,158,117,0.3)","#1D9E75","#1D9E75"],
                    ["Pipeline auto","R$ "+(autoTotal/1000).toFixed(0)+"k","rgba(24,95,165,0.08)","rgba(24,95,165,0.3)","#185FA5","#185FA5"],
                    ["Atingimento",pct+"%",`rgba(${pc==="1D9E75"?"29,158,117":pc==="#EF9F27"?"239,159,39":"226,75,74"},0.08)`,pc+"44",pc,pc],
                  ].map(([l,v,bg,bc,lc,vc])=>(
                    <div key={l} style={{background:bg,border:`1px solid ${bc}`,borderRadius:"8px",padding:"10px 14px"}}>
                      <div style={{fontSize:"10px",color:lc,opacity:.8,marginBottom:"4px",textTransform:"uppercase",letterSpacing:".06em"}}>{l}</div>
                      <div style={{fontSize:"22px",fontWeight:700,color:vc}}>{v}</div>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* ── MATRIZ FORNECEDOR × CLIENTE ── */}
            {budgetView==="matrix" && (()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const suppliers = [...new Set(yr.map(b=>b.supplier))].sort();
              const clients   = [...new Set(yr.map(b=>b.client))].sort();
              function getB(sup,cli){ return yr.filter(b=>b.supplier===sup&&b.client===cli); }
              function cellMeta(sup,cli){ return getB(sup,cli).reduce((s,b)=>s+totalMeta(b),0); }
              function cellReal(sup,cli){ return getB(sup,cli).reduce((s,b)=>s+totalRealizado(b),0); }
              function rowTotal(sup){ return yr.filter(b=>b.supplier===sup).reduce((s,b)=>s+totalMeta(b),0); }
              function colTotal(cli){ return yr.filter(b=>b.client===cli).reduce((s,b)=>s+totalMeta(b),0); }
              const grand = yr.reduce((s,b)=>s+totalMeta(b),0);
              return (
                <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse",fontSize:"11px",minWidth:"700px",width:"100%"}}>
                    <thead>
                      <tr style={{background:"var(--bg-card2)"}}>
                        <th style={{padding:"8px 10px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,borderBottom:"1px solid var(--border)",position:"sticky",left:0,background:"var(--bg-card2)",minWidth:"110px"}}>Fornecedor</th>
                        {clients.map(c=>(
                          <th key={c} style={{padding:"8px 8px",textAlign:"center",color:"var(--text-secondary)",fontWeight:600,borderBottom:"1px solid var(--border)",whiteSpace:"nowrap",fontSize:"10px"}}>{c}</th>
                        ))}
                        <th style={{padding:"8px 8px",textAlign:"right",color:"var(--text-accent)",fontWeight:700,borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>TOTAL</th>
                      </tr>
                    </thead>
                    <tbody>
                      {suppliers.map(sup=>{
                        const rt = rowTotal(sup);
                        return (
                          <tr key={sup} style={{borderBottom:"1px solid var(--border2)"}}>
                            <td style={{padding:"8px 10px",fontWeight:600,color:"var(--text-primary)",position:"sticky",left:0,background:"var(--bg-card)",whiteSpace:"nowrap"}}>{sup}</td>
                            {clients.map(cli=>{
                              const m = cellMeta(sup,cli);
                              const r = cellReal(sup,cli);
                              const p = m>0?Math.round(r/m*100):0;
                              const pc2 = p>=80?"#1D9E75":p>=50?"#EF9F27":"#E24B4A";
                              return (
                                <td key={cli} style={{padding:"6px 8px",textAlign:"center",verticalAlign:"middle"}}>
                                  {m>0?(
                                    <div style={{display:"inline-block",minWidth:"64px"}}>
                                      <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-primary)"}}>R$ {(m/1000).toFixed(0)}k</div>
                                      <div style={{height:"3px",background:"var(--bg-card2)",borderRadius:"2px",margin:"2px 0",overflow:"hidden"}}>
                                        <div style={{height:"100%",width:Math.min(p,100)+"%",background:pc2,borderRadius:"2px"}}/>
                                      </div>
                                      {r>0&&<div style={{fontSize:"9px",color:pc2,fontWeight:600}}>{p}%</div>}
                                    </div>
                                  ):<span style={{color:"var(--text-muted)"}}>—</span>}
                                </td>
                              );
                            })}
                            <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:"var(--text-accent)"}}>R$ {(rt/1000).toFixed(0)}k</td>
                          </tr>
                        );
                      })}
                      {/* Linha de totais */}
                      <tr style={{background:"var(--bg-card2)",borderTop:"2px solid var(--border)"}}>
                        <td style={{padding:"8px 10px",fontWeight:700,color:"var(--text-accent)",position:"sticky",left:0,background:"var(--bg-card2)"}}>TOTAL</td>
                        {clients.map(cli=>(
                          <td key={cli} style={{padding:"8px",textAlign:"center",fontWeight:700,color:"var(--text-primary)"}}>R$ {(colTotal(cli)/1000).toFixed(0)}k</td>
                        ))}
                        <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:"var(--text-accent)"}}>R$ {(grand/1000).toFixed(0)}k</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              );
            })()}

            {/* ── POR FORNECEDOR ── */}
            {budgetView==="supplier" && (()=>{
              const yr = budgets.filter(b=>b.year===CUR_YEAR);
              const suppliers = [...new Set(yr.map(b=>b.supplier))].sort();
              return (
                <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                  {suppliers.map(sup=>{
                    const entries = yr.filter(b=>b.supplier===sup);
                    const meta = entries.reduce((s,b)=>s+totalMeta(b),0);
                    const real = entries.reduce((s,b)=>s+totalRealizado(b),0);
                    const auto = entries.reduce((s,b)=>s+autoRealizado(b),0);
                    const pct  = meta>0?Math.round(real/meta*100):0;
                    const pc   = pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";
                    return (
                      <div key={sup} style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text-primary)"}}>{sup}</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)",marginTop:"1px"}}>{entries.length} cliente(s) com meta</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:"18px",fontWeight:700,color:pc}}>{pct}%</div>
                            <div style={{fontSize:"10px",color:"var(--text-secondary)"}}>R$ {(real/1000).toFixed(0)}k / R$ {(meta/1000).toFixed(0)}k</div>
                          </div>
                        </div>
                        <div style={{height:"5px",background:"var(--bg-card2)",borderRadius:"3px",marginBottom:"10px",overflow:"hidden"}}>
                          <div style={{height:"100%",width:Math.min(pct,100)+"%",background:pc,borderRadius:"3px",transition:"width .4s"}}/>
                        </div>
                        {/* Detalhamento por cliente */}
                        <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                          {entries.map(b=>{
                            const bm=totalMeta(b), br=totalRealizado(b);
                            const bp=bm>0?Math.round(br/bm*100):0;
                            const bpc=bp>=80?"#1D9E75":bp>=50?"#EF9F27":"#E24B4A";
