              {projForm.supplier==="Lubbering"&&(
                <div style={{border:"1px solid rgba(24,95,165,0.3)",borderRadius:"10px",padding:"16px",marginBottom:"16px"}}>
                  <div style={{fontSize:"12px",fontWeight:700,color:"#185FA5",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"14px"}}>Anfrageformblatt — Lübbering</div>

                  <div style={{marginBottom:"14px"}}>
                    <label style={lbl}>Projektbezeichnung · Project</label>
                    <input value={projForm.lub_project} onChange={e=>setProjForm({...projForm,lub_project:e.target.value})} style={inp} placeholder="Nome/descrição do projeto"/>
                  </div>

                  <div style={{fontSize:"11px",fontWeight:600,color:"#185FA5",marginBottom:"8px",borderBottom:"1px solid rgba(24,95,165,0.2)",paddingBottom:"4px"}}>Technische Angaben · Technical Details</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"16px"}}>
                    <div>
                      <label style={lbl}>Torque (Nm)</label>
                      <input type="number" value={projForm.lub_torque} onChange={e=>setProjForm({...projForm,lub_torque:e.target.value})} style={inp}/>
                    </div>
                    <div>
                      <label style={lbl}>Min / Max</label>
                      <select value={projForm.lub_torqueMinMax} onChange={e=>setProjForm({...projForm,lub_torqueMinMax:e.target.value})} style={inp}>
                        <option value="min">Min</option><option value="max">Max</option>
                      </select>
                    </div>
                    <div>
                      <label style={lbl}>Precisão (Accuracy)</label>
                      <input value={projForm.lub_accuracy} onChange={e=>setProjForm({...projForm,lub_accuracy:e.target.value})} style={inp} placeholder="Ex: ±3%"/>
                    </div>
                    <div>
                      <label style={lbl}>Bitola SW (Socket size)</label>
                      <input value={projForm.lub_socket} onChange={e=>setProjForm({...projForm,lub_socket:e.target.value})} style={inp} placeholder="Ex: SW19"/>
                    </div>
                  </div>

                  <div style={{fontSize:"11px",fontWeight:600,color:"#185FA5",marginBottom:"8px",borderBottom:"1px solid rgba(24,95,165,0.2)",paddingBottom:"4px"}}>Abtrieb · Output type</div>
                  <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
                    {[["closed_offset","Closed offset"],["open_offset","Open offset"]].map(([v,l])=>(
                      <button key={v} onClick={()=>setProjForm({...projForm,lub_outputType:v})}
                        style={{flex:1,padding:"9px",fontSize:"12px",borderRadius:"6px",border:"1px solid "+(projForm.lub_outputType===v?"#185FA5":"var(--border)"),background:projForm.lub_outputType===v?"rgba(24,95,165,0.12)":"transparent",color:projForm.lub_outputType===v?"#185FA5":"var(--text-secondary)",cursor:"pointer",fontWeight:projForm.lub_outputType===v?600:400}}>{l}</button>
                    ))}
                  </div>

                  <div style={{fontSize:"11px",fontWeight:600,color:"#185FA5",marginBottom:"8px",borderBottom:"1px solid rgba(24,95,165,0.2)",paddingBottom:"4px"}}>Abtriebsprofile · Socket Profiles</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"6px",marginBottom:"16px"}}>
                    {["HEX","DH","BH","SFD","PF","NH","Torx E","Torx TX","SD","HD","AVZ","IVZ"].map(p=>{
                      const isSel=(projForm.lub_profileTypes||[]).includes(p);
                      return (
                        <button key={p} onClick={()=>{const cur=projForm.lub_profileTypes||[];setProjForm({...projForm,lub_profileTypes:isSel?cur.filter(x=>x!==p):[...cur,p]});}}
                          style={{padding:"7px 4px",fontSize:"11px",borderRadius:"5px",border:"1px solid "+(isSel?"#185FA5":"var(--border)"),background:isSel?"rgba(24,95,165,0.12)":"transparent",color:isSel?"#185FA5":"var(--text-secondary)",cursor:"pointer",fontWeight:isSel?700:400,textAlign:"center"}}>{p}</button>
                      );
                    })}
                  </div>

                  <div style={{fontSize:"11px",fontWeight:600,color:"#185FA5",marginBottom:"8px",borderBottom:"1px solid rgba(24,95,165,0.2)",paddingBottom:"4px"}}>Sonderformen · Special Forms</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px",marginBottom:"16px"}}>
                    {["Außenlänge (Extended)","Durchgeräumt (Broached)","Profiltiefe (Profile depth)","BH-Standard","BH-Sonder (bolt retaining)","Magnet Sackloch (blind)","Magnet Kernloch (core)","Abtrieb federnd (elastic)"].map(f=>{
                      const isSel=(projForm.lub_specialForms||[]).includes(f);
                      return (
                        <button key={f} onClick={()=>{const cur=projForm.lub_specialForms||[];setProjForm({...projForm,lub_specialForms:isSel?cur.filter(x=>x!==f):[...cur,f]});}}
                          style={{padding:"6px 7px",fontSize:"10px",borderRadius:"5px",border:"1px solid "+(isSel?"#185FA5":"var(--border)"),background:isSel?"rgba(24,95,165,0.12)":"transparent",color:isSel?"#185FA5":"var(--text-secondary)",cursor:"pointer",fontWeight:isSel?600:400,textAlign:"left"}}>{f}</button>
                      );
                    })}
                  </div>

                  <div style={{fontSize:"11px",fontWeight:600,color:"#185FA5",marginBottom:"8px",borderBottom:"1px solid rgba(24,95,165,0.2)",paddingBottom:"4px"}}>Adaption · Driving Machine</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px"}}>
                    <div>
                      <label style={lbl}>Tipo de adaptação</label>
                      <select value={projForm.lub_adaptionType} onChange={e=>setProjForm({...projForm,lub_adaptionType:e.target.value})} style={inp}>
                        <option value="">Selecionar...</option>
                        <option>Angle head 90°</option>
                        <option>Angle head 110°</option>
                        <option>Straight spindle</option>
                        <option>Pistol grip machine</option>
                      </select>
                    </div>
                    <div>
                      <label style={lbl}>Máquina motriz</label>
                      <input value={projForm.lub_driveMachine} onChange={e=>setProjForm({...projForm,lub_driveMachine:e.target.value})} style={inp}/>
                    </div>
                    <div>
                      <label style={lbl}>Artigo nº</label>
                      <input value={projForm.lub_articleNo} onChange={e=>setProjForm({...projForm,lub_articleNo:e.target.value})} style={inp}/>
                    </div>
                    <div>
                      <label style={lbl}>Torque máx. (Nm)</label>
                      <input type="number" value={projForm.lub_maxTorque} onChange={e=>setProjForm({...projForm,lub_maxTorque:e.target.value})} style={inp}/>
                    </div>
                    <div>
                      <label style={lbl}>RPM máx.</label>
                      <input type="number" value={projForm.lub_maxRPM} onChange={e=>setProjForm({...projForm,lub_maxRPM:e.target.value})} style={inp}/>
                    </div>
                  </div>
                </div>
              )}

              {/* Outro */}
              {projForm.supplier==="outro"&&(
                <div style={{marginBottom:"16px"}}>
                  <label style={lbl}>Descrição / especificações técnicas</label>
                  <textarea value={projForm.notes} onChange={e=>setProjForm({...projForm,notes:e.target.value})} style={{...inp,height:"120px"}} placeholder="Descreva os requisitos do projeto..."/>
                </div>
              )}

              {/* Notas */}
              <div style={{marginBottom:"20px"}}>
                <label style={lbl}>Notas internas</label>
                <textarea value={projForm.notes} onChange={e=>setProjForm({...projForm,notes:e.target.value})} style={{...inp,height:"72px"}} placeholder="Observações, fotos disponíveis, contexto..."/>
              </div>

            </div>{/* fim corpo scrollável */}

            {/* Footer */}
            <div style={{padding:"14px 24px",borderTop:"1px solid var(--border2)",display:"flex",gap:"8px",flexShrink:0}}>
              <button onClick={()=>{if(!projForm.name)return;projForm.id?updateProj(projForm):addProjeto();setProjModal(false);}} disabled={!projForm.name}
                style={{flex:1,padding:"10px",fontSize:"13px",borderRadius:"6px",border:"none",background:projForm.name?"#8C1A1A":"#4A2A2A",color:projForm.name?"#FFD0D0":"#7A5050",cursor:projForm.name?"pointer":"default",fontWeight:600}}>
                {projForm.id?"Salvar alterações":"Criar projeto"}
              </button>
              <button onClick={()=>setProjModal(false)} style={{padding:"10px 16px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
            </div>

          </div>
        </div>
      )}

      {/* MODAL VISITA 5W2H */}
      {visitaModal && visitaOpp && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60,padding:"16px"}}>
          <div style={{background:"var(--bg-card)",borderRadius:"12px",border:"1px solid var(--border)",padding:"20px",width:"520px",maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
              <div style={{fontSize:"14px",fontWeight:600,color:"var(--text-primary)"}}>Registrar visita</div>
              <button onClick={()=>setVisitaModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"16px"}}>✕</button>
            </div>
            <div style={{fontSize:"11px",color:"var(--text-accent)",marginBottom:"14px"}}>{visitaOpp.company} · {visitaOpp.title}</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
              <div>
                <label style={lbl}>Data da visita</label>
                <input type="date" value={visitaForm.date} onChange={e=>setVisitaForm({...visitaForm,date:e.target.value})} style={inp}/>
              </div>
              <div>
                <label style={lbl}>Próximo passo (When)</label>
                <input type="date" value={visitaForm.when} onChange={e=>setVisitaForm({...visitaForm,when:e.target.value})} style={inp}/>
              </div>
            </div>

            <div style={{marginBottom:"8px"}}>
              <label style={lbl}>Resumo da visita *</label>
              <textarea value={visitaForm.summary} onChange={e=>setVisitaForm({...visitaForm,summary:e.target.value})}
                style={{...inp,height:"72px"}} placeholder="Descreva o que aconteceu na reunião/visita..."/>
            </div>

            <div style={{background:"var(--bg-card2)",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px"}}>
              <div style={{fontSize:"10px",fontWeight:600,color:"var(--text-secondary)",marginBottom:"8px",textTransform:"uppercase",letterSpacing:".08em"}}>5W2H</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                {[
                  ["what","O quê? (What)","O que foi discutido/apresentado?"],
                  ["why","Por quê? (Why)","Qual a necessidade/dor do cliente?"],
                  ["who","Quem? (Who)","Quem participou? Decisores?"],
                  ["where","Onde? (Where)","Local / departamento / linha"],
                  ["how","Como? (How)","Como a solução resolve o problema?"],
                  ["howMuch","Quanto? (How Much)","Valor estimado / investimento"],
                ].map(([k,label,ph])=>(
                  <div key={k}>
                    <label style={lbl}>{label}</label>
                    <textarea value={visitaForm[k]} onChange={e=>setVisitaForm({...visitaForm,[k]:e.target.value})}
                      style={{...inp,height:"52px",fontSize:"11px"}} placeholder={ph}/>
                  </div>
                ))}
              </div>
            </div>

            <div style={{marginBottom:"14px"}}>
              <label style={lbl}>Próximo passo (What)</label>
              <textarea value={visitaForm.nextStep} onChange={e=>setVisitaForm({...visitaForm,nextStep:e.target.value})}
                style={{...inp,height:"52px"}} placeholder="Ação concreta com responsável e prazo definido..."/>
            </div>

            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={saveVisita} disabled={!visitaForm.summary}
                style={{flex:1,padding:"10px",fontSize:"13px",borderRadius:"6px",border:"none",background:visitaForm.summary?"#8C1A1A":"#4A2A2A",color:visitaForm.summary?"#FFD0D0":"#7A5050",cursor:visitaForm.summary?"pointer":"default",fontWeight:600}}>
                Salvar visita
              </button>
              <button onClick={()=>setVisitaModal(false)} style={{padding:"10px 16px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
