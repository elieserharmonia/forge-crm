<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FORECAST-CRM · 3S+M</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background .25s,color .25s}
    input,select,textarea,button{font-family:inherit}
    textarea{resize:vertical}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{border-radius:3px}
    body.theme-dark{
      --bg-app:#1a1a1a;--bg-header:#2A2A2A;--bg-card:#252525;--bg-card2:#1E1E1E;
      --bg-input:#1a1a1a;--border:#3A3A3A;--border2:#2E2E2E;
      --text-primary:#F0EDED;--text-secondary:#A09090;--text-muted:#5A5050;
      --text-accent:#FFAAAA;--text-green:#9FE1CB;--text-blue:#85B7EB;
      --sinuelo:#8C1A1A;--sinuelo-light:rgba(140,26,26,0.25);--sinuelo-text:#FFAAAA;
      --scrollbar:#444;
    }
    body.theme-light{
      --bg-app:#f0eeea;--bg-header:#ffffff;--bg-card:#ffffff;--bg-card2:#f7f5f2;
      --bg-input:#f7f5f2;--border:#e0ddd8;--border2:#ece9e4;
      --text-primary:#1a1a1a;--text-secondary:#6b6560;--text-muted:#b0aaa4;
      --text-accent:#8C1A1A;--text-green:#0F6E56;--text-blue:#185FA5;
      --sinuelo:#8C1A1A;--sinuelo-light:rgba(140,26,26,0.10);--sinuelo-text:#8C1A1A;
      --scrollbar:#ccc;
    }
    body{background:var(--bg-app);color:var(--text-primary)}
    ::-webkit-scrollbar-thumb{background:var(--scrollbar)}
  </style>
</head>
<body class="theme-light">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── SUPABASE CONFIG ──────────────────────────────────────────────────────
const SUPA_URL = "https://zckgghiweapaykcuiara.supabase.co";
const SUPA_KEY = "sb_publishable_LrE8hZV2yfyED0QEp_MKqg_VH4aZRKr";

const supa = (function() {
  try {
    const fn = window.supabase && window.supabase.createClient;
    if (!fn) return null;
    return fn(SUPA_URL, SUPA_KEY, {
      auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
    });
  } catch(e) { return null; }
})();

window.__S = undefined; 
window.__SUPA_PROFILE = null;
if (supa) {
  supa.auth.getSession().then(function(r){
    window.__S = r.data.session || false;
  }).catch(function(){ window.__S = false; });
} else {
  window.__S = false;
}

const STAGES = [
  { id:"prospeccao",   label:"Prospecção",   tag:"S1",   color:"var(--text-secondary)" },
  { id:"qualificacao", label:"Qualificação",  tag:"S2",   color:"#FF9090" },
  { id:"diagnostico",  label:"Diagnóstico",   tag:"S2+",  color:"#378ADD" },
  { id:"proposta",     label:"Proposta",      tag:"S3",   color:"#BA7517" },
  { id:"negociacao",   label:"Negociação",    tag:"NEG",  color:"#D85A30" },
  { id:"fechamento",   label:"Fechamento",    tag:"FECH", color:"#639922" },
  { id:"pos_venda",    label:"Pós-Venda",     tag:"M",    color:"#0F6E56" },
];

const DEMO = [{"id": "1700000001", "title": "Multiplicador HT3 - 1000 + Tor. Pro 200 - 1504", "company": "Arcelormittal", "supplier": "Norbar", "contact": "Rafael Martins", "resp": "Elieser", "value": 0, "stage": "qualificacao", "priority": "baixa", "negType": "D", "forecastColor": "none", "nextAction": "15.04.26 - Verificar torque processo", "nextDate": "", "notes": "15.04.26 - Verificar torque processo\n01.04.26 - Primeira visita - oportunidade", "months": {"m1": true}, "history": [], "visitHistory": [], "createdAt": "2026-03-01"}];
const CLIENTS = [{"alias": "CATERPILLAR", "name": "CATERPILLAR BRASIL LTDA", "cnpj": "61.064.911/0001-77", "city": "PIRACICABA", "state": "SP"}];
const STORAGE_KEY = "crm_industrial_v2";
const PRI_BG  = {alta:"#FCEBEB",media:"#FAEEDA",baixa:"#EAF3DE"};
const PRI_TXT = {alta:"#791F1F",media:"#633806",baixa:"#27500A"};

const SYS_PROMPT = `Você é o Gestor Comercial IA...`;

function loadData() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

function LoginScreen() {
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState(null);

  async function loginGoogle() {
    if (!supa) { alert("Chaves do Supabase não configuradas."); return; }
    setLoading(true); setErr(null);
    const { error } = await supa.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin }
    });
    if (error) { setErr(error.message); setLoading(false); }
  }

  return (
    <div style={{minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"var(--bg-app)"}}>
      <div style={{width:"360px", background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:"16px", padding:"40px 32px", textAlign:"center", boxShadow:"0 8px 40px rgba(0,0,0,0.15)"}}>
        <h2 style={{fontSize:"22px",fontWeight:800,color:"var(--text-primary)",marginBottom:"32px"}}>FORECAST-CRM</h2>
        <button onClick={loginGoogle} disabled={loading} style={{width:"100%", padding:"13px 20px", fontSize:"14px", fontWeight:600, borderRadius:"10px", border:"1px solid #ddd", background:"#fff", cursor:"pointer"}}>
          {loading ? "Aguarde..." : "Entrar com Google"}
        </button>
        {err && <div style={{marginTop:"14px",color:"#E24B4A",fontSize:"12px"}}>{err}</div>}
      </div>
    </div>
  );
}

function App() {
  // ── 1. TODOS OS HOOKS (ESTADOS) NO TOPO DA FILA ────────────────────────
  const [authSession, setAuthSession] = useState(()=> window.__S !== undefined ? window.__S : null);
  const [authProfile, setAuthProfile] = useState(null);
  const [authChecked, setAuthChecked] = useState(()=> window.__S !== undefined);

  const [opps, setOpps]           = useState(() => loadData() || DEMO);
  const [sel, setSel]             = useState(null);
  const [view, setView]           = useState("kanban");
  const [pipelineView, setPipelineView] = useState(() => localStorage.getItem("crm_pipe_view") || "kanban");
  const [forecastFilter, setForecastFilter] = useState("todos");
  const [apiKey, setApiKey]       = useState(() => localStorage.getItem("crm_api_key") || "");
  const [newModal, setNewModal]   = useState(false);
  const [form, setForm]           = useState({title:"",company:"",contact:"",value:"",stage:"prospeccao",priority:"media",nextAction:"",nextDate:"",nextTime:"",notes:"",supplier:"",resp:"",forecastColor:"none",confidence:0.1,negType:"D"});

  // ── 2. EFEITOS (USEEFFECT) ───────────────────────────────────────────
  useEffect(()=>{
    if (!supa) { setAuthChecked(true); return; }
    if (window.__S === undefined) {
      const poll = setInterval(()=>{
        if (window.__S !== undefined) {
          clearInterval(poll);
          setAuthSession(window.__S);
          setAuthChecked(true);
        }
      }, 50);
      return () => clearInterval(poll);
    }
    const { data: { subscription } } = supa.auth.onAuthStateChange((_e, session) => {
      setAuthSession(session || false);
      setAuthChecked(true);
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => { saveData(opps); }, [opps]);

  // ── 3. FUNÇÕES AUXILIARES ───────────────────────────────────────────
  function handleSignOut() { if (supa) supa.auth.signOut(); setAuthSession(false); }
  function updateOpp(u) { setOpps(opps.map(o => o.id===u.id ? u : o)); setSel(u); }

  // ── 4. CORREÇÃO DO ERRO 310: AS TELAS CONDICIONAIS FICAM AQUI ─────────
  if (!authChecked) {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg-app)"}}>
        <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"13px"}}>Carregando...</div>
      </div>
    );
  }

  if (supa && authSession === false) return <LoginScreen />;

  // ── 5. RENDERIZAÇÃO DO APP PRINCIPAL ────────────────────────────────
  return (
    <div style={{background:"var(--bg-app)", minHeight:"100vh", padding:"20px"}}>
      <div style={{background:"var(--bg-header)", padding:"16px", borderRadius:"12px", border:"1px solid var(--border)", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
         <h2 style={{color:"var(--text-primary)"}}>FORECAST-CRM Ativo</h2>
         <button onClick={handleSignOut} style={{padding:"8px 16px", borderRadius:"8px", border:"1px solid #E24B4A", color:"#E24B4A", cursor:"pointer"}}>Sair</button>
      </div>
      <div style={{marginTop:"20px", color:"var(--text-secondary)"}}>
         Bem-vindo, {authSession?.user?.email}! O Erro 310 foi resolvido.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
