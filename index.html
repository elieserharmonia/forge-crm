function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}

  function delOrcamento(id){ saveOrcamentos(orcamentos.filter(o=>o.id!==id)); }

  // PROJETOS

  const THEME_KEY = "crm_theme_v1";

  const [themePref, setThemePref] = useState(() => localStorage.getItem(THEME_KEY) || "dark");
  const resolvedTheme = themePref === "system" ? getSystemTheme() : themePref;
  useEffect(() => {
    document.body.classList.remove("theme-dark","theme-light");
    document.body.classList.add("theme-" + (themePref==="system" ? getSystemTheme() : themePref));
    localStorage.setItem(THEME_KEY, themePref);
  }, [themePref]);
  useEffect(() => {
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const handler = () => { if(themePref==="system"){ document.body.classList.remove("theme-dark","theme-light"); document.body.classList.add("theme-"+(mq.matches?"dark":"light")); }};
    mq.addEventListener("change",handler);
    return () => mq.removeEventListener("change",handler);
  }, [themePref]);

  useEffect(() => { saveData(opps); }, [opps]);
  useEffect(() => { aiEnd.current?.scrollIntoView({behavior:"smooth"}); }, [aiMsgs]);

  function setAndSave(list) { setOpps(list); }

  function updateOpp(u) {
    setAndSave(opps.map(o => o.id===u.id ? u : o));
    setSel(u);
  }

  function move(id, dir) {
    const opp = opps.find(o=>o.id===id);
    const idx = STAGES.findIndex(s=>s.id===opp.stage);
    const ni  = idx+dir;
    if (ni<0||ni>=STAGES.length) return;
    const u = {...opp, stage:STAGES[ni].id};
    setAndSave(opps.map(o=>o.id===id?u:o));
    setSel(u);
  }

  function addOpp() {
    if (!form.title||!form.company) return;
    const o = {...form, id:Date.now().toString(), value:Number(form.value)||0, history:[], createdAt:new Date().toISOString().slice(0,10)};
    setAndSave([...opps, o]);
    setNewModal(false);
    setForm({title:"",company:"",contact:"",value:"",stage:"prospeccao",priority:"media",nextAction:"",nextDate:"",notes:"",supplier:"",resp:"",forecastColor:"none",confidence:0.1});
  }

  function delOpp(id) { setAndSave(opps.filter(o=>o.id!==id)); setSel(null); }

  function exportData() {
    const blob = new Blob([JSON.stringify(opps,null,2)],{type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download="crm-backup.json"; a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (Array.isArray(d)) { setAndSave(d); alert("Dados importados com sucesso!"); }
        else alert("Formato inválido.");
      } catch { alert("Arquivo inválido."); }
    };
    reader.readAsText(file);
    e.target.value="";
  }

  function saveKey() {
    localStorage.setItem(KEY_STORE, keyDraft);
    setApiKey(keyDraft);
    setShowKey(false);
  }

  async function chat(msg) {
    const m = msg||aiInput;
    if (!m.trim()||aiLoading) return;
    if (!apiKey) { setKeyDraft(""); setShowKey(true); return; }
    const ctx = sel
      ? `Oportunidade: "${sel.title}" | Empresa: ${sel.company} | Etapa: ${STAGES.find(s=>s.id===sel.stage)?.label} | Valor: R$ ${(sel.value||0).toLocaleString("pt-BR")} | Próxima ação: ${sel.nextAction} | Notas: ${sel.notes}`
      : "Nenhuma oportunidade selecionada.";
    const msgs = [...aiMsgs, {role:"user",content:m}];
    setAiMsgs(msgs);
    setAiInput("");
    setAiLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:SYS_PROMPT,
          messages:[...msgs.slice(0,-1),{role:"user",content:`${m}\n\nContexto: ${ctx}`}]
        })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error.message);
      const reply = d.content?.map(c=>c.text||"").join("")||"Sem resposta.";
      setAiMsgs([...msgs,{role:"assistant",content:reply}]);
    } catch(err) {
      setAiMsgs([...msgs,{role:"assistant",content:`Erro: ${err.message}`}]);
    }
    setAiLoading(false);
  }

  function openAI(prompt) {

  }

        <div style={{display:"flex",alignItems:"center",gap:"8px",flex:1,minWidth:"160px"}}>

            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"10px",flexWrap:"wrap"}}>
              <div style={{display:"flex",gap:"2px",background:"rgba(128,128,128,0.12)",borderRadius:"8px",padding:"3px"}}>
                {[["kanban","⊞ Kanban"],["lines","≡ Linhas"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setPipeView(v)} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"6px",border:"none",cursor:"pointer",background:pipelineView===v?"#8C1A1A":"transparent",color:pipelineView===v?"#fff":"var(--text-secondary)",fontWeight:pipelineView===v?700:400,transition:"all .15s"}}>{l}</button>
                ))}
              </div>
              {pipelineView==="lines" && (
                <>
                  <select value={forecastFilter} onChange={e=>setForecastFilter(e.target.value)} style={{fontSize:"11px",padding:"4px 8px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-input)",color:"var(--text-primary)",cursor:"pointer"}}>
                    <option value="todos">Todas etapas</option>
                    {STAGES.map(s=><option key={s.id} value={s.id}>{s.tag} {s.label}</option>)}
                    <option value="yellow">🟡 Devemos ao cliente</option>
                    <option value="red">🔴 Em negociação ativa</option>
                    <option value="gray">⚫ Perdidos</option>
                  </select>
                  <span style={{fontSize:"11px",color:"var(--text-muted)",marginLeft:"4px"}}>
                    {(()=>{
                      const filtered = opps.filter(o=>forecastFilter==="todos"||o.stage===forecastFilter||o.forecastColor===forecastFilter);
                      const tot = filtered.reduce((s,o)=>s+(o.value||0),0);
                      return `${filtered.length} opp · R$ ${tot.toLocaleString("pt-BR")}`;
                    })()}
                  </span>
                </>
              )}
            </div>

            {/* KANBAN */}
            {pipelineView==="kanban" && (
              <div style={{overflowX:"auto"}}>
                <div style={{display:"flex",gap:"8px",paddingBottom:"8px",minWidth:"max-content"}}>
                  {STAGES.map(stage=>{
                    const cols   = opps.filter(o=>o.stage===stage.id);
                    const colVal = cols.reduce((s,o)=>s+(o.value||0),0);
                    return (
                      <div key={stage.id} style={{width:"196px",flexShrink:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"6px"}}>
                          <span style={{fontSize:"10px",fontWeight:600,padding:"2px 7px",borderRadius:"10px",background:stage.color+"22",color:stage.color}}>{stage.tag}</span>
                          <span style={{fontSize:"12px",fontWeight:600,flex:1,color:"var(--text-primary)"}}>{stage.label}</span>
                          <span style={{fontSize:"11px",color:"var(--text-muted)"}}>{cols.length}</span>
                        </div>
                        {colVal>0 && <div style={{fontSize:"11px",color:"var(--text-muted)",marginBottom:"5px"}}>R$ {(colVal/1000).toFixed(0)}k</div>}
                        <div style={{display:"flex",flexDirection:"column",gap:"6px",minHeight:"60px"}}>
                          {cols.map(opp=>(
                            <div key={opp.id} onClick={()=>setSel(opp===sel?null:opp)}
                              style={{background:"var(--bg-header)",border:`1px solid ${sel?.id===opp.id?stage.color:"var(--border)"}`,borderLeft:`3px solid ${stage.color}`,borderRadius:"0 8px 8px 0",padding:"10px 10px 10px 9px",cursor:"pointer"}}>
                              <div style={{fontSize:"12px",fontWeight:600,marginBottom:"3px",lineHeight:1.3,color:"var(--text-primary)"}}>{opp.title}</div>
                              <div style={{fontSize:"11px",color:"var(--text-secondary)",marginBottom:"7px"}}>{opp.company}</div>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                <span style={{fontSize:"12px",fontWeight:600,color:"var(--text-primary)"}}>R$ {(opp.value/1000).toFixed(0)}k</span>
                                <span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"8px",background:PRI_BG[opp.priority],color:PRI_TXT[opp.priority],fontWeight:600}}>{opp.priority}</span>
                              </div>
                              {opp.nextDate&&opp.nextDate<today && <div style={{fontSize:"10px",color:"#FF7777",marginTop:"5px",fontWeight:600}}>Atrasado · {opp.nextDate}</div>}
                              {opp.nextAction && <div style={{fontSize:"10px",color:"var(--text-secondary)",marginTop:"3px",lineHeight:1.3}}>{opp.nextAction.slice(0,52)}{opp.nextAction.length>52?"…":""}</div>}
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* LINHAS — formato Forecast planilha */}
            {pipelineView==="lines" && (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px",minWidth:"900px"}}>
                  <thead>
                    <tr style={{background:"var(--bg-card2)",position:"sticky",top:0,zIndex:5}}>
                      {[["neg","NEG.","40px"],["resp","RESP.","60px"],["company","CUSTOMER","120px"],["supplier","SUPPLIER","90px"],["title","DESCRIPTION","220px"],["value","AMOUNT","90px"],["stage","CONFIDENCE","80px"],["nextDate","FOLLOW-UP","200px"],["contact","CONTATOS","100px"]].map(([key,label,w])=>(
                        <th key={key} onClick={()=>{ if(sortCol===key){setSortDir(d=>d==="asc"?"desc":"asc");}else{setSortCol(key);setSortDir("desc");} }}
                          style={{padding:"7px 9px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:"10px",borderBottom:`1px solid var(--border)`,cursor:"pointer",whiteSpace:"nowrap",width:w,userSelect:"none"}}>
                          {label}{sortCol===key?(sortDir==="asc"?" ↑":" ↓"):""}
                        </th>
                      ))}
                      <th style={{padding:"7px 9px",width:"32px"}}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {(()=>{
                      let rows = [...opps];
                      if(forecastFilter!=="todos") rows = rows.filter(o=>o.stage===forecastFilter||o.forecastColor===forecastFilter);
                      rows.sort((a,b)=>{
                        const stageOrder = ["prospeccao","qualificacao","diagnostico","proposta","neg","po_recebido","fechado"];
                        let av,bv;
                        if(sortCol==="stage") { av=stageOrder.indexOf(a.stage); bv=stageOrder.indexOf(b.stage); }
                        else if(sortCol==="value") { av=a.value||0; bv=b.value||0; }
                        else if(sortCol==="confidence") { av=a.confidence||0; bv=b.confidence||0; }
                        else { av=(a[sortCol]||"").toString().toLowerCase(); bv=(b[sortCol]||"").toString().toLowerCase(); }
                        if(av<bv) return sortDir==="asc"?-1:1;
                        if(av>bv) return sortDir==="asc"?1:-1;
                        return 0;
                      });
                      return rows.map(opp=>{
                        const stage = STAGES.find(s=>s.id===opp.stage);
                        const rowBg = opp.forecastColor==="yellow"
                          ? "rgba(239,159,39,0.12)"
                          : opp.forecastColor==="red"
                          ? "rgba(226,75,74,0.12)"
                          : opp.forecastColor==="gray"
                          ? "rgba(95,94,90,0.15)"
                          : "transparent";
                        const dotColor = opp.forecastColor==="yellow"?"#EF9F27":opp.forecastColor==="red"?"#E24B4A":opp.forecastColor==="gray"?"#888780":stage?.color||"#888";
                        // confidence label
                        const confPct = opp.stage==="fechado"?"100%":opp.stage==="po_recebido"?"90%":opp.stage==="neg"?"80%":opp.stage==="proposta"?"50%":opp.stage==="diagnostico"?"30%":opp.stage==="qualificacao"||opp.stage==="prospeccao"?"10%":"—";
                        return (
                          <tr key={opp.id} onClick={()=>setSel(opp===sel?null:opp)}
                            style={{background:sel?.id===opp.id?"rgba(140,26,26,0.12)":rowBg,borderBottom:`1px solid var(--border2)`,cursor:"pointer",transition:"background .1s"}}>
                            {/* NEG dot */}
                            <td style={{padding:"7px 9px"}}>
                              <div style={{width:"10px",height:"10px",borderRadius:"50%",background:dotColor,margin:"0 auto"}}/>
                            </td>
                            {/* RESP */}
                            <td style={{padding:"7px 9px",color:"var(--text-secondary)",whiteSpace:"nowrap"}}>{opp.resp||"EF"}</td>
                            {/* CUSTOMER */}
                            <td style={{padding:"7px 9px",fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap"}}>{opp.company}</td>
                            {/* SUPPLIER */}
                            <td style={{padding:"7px 9px",color:"var(--text-secondary)",whiteSpace:"nowrap"}}>{opp.supplier||"—"}</td>
                            {/* DESCRIPTION */}
                            <td style={{padding:"7px 9px",color:"var(--text-primary)",maxWidth:"220px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{opp.title}</td>
                            {/* AMOUNT */}
                            <td style={{padding:"7px 9px",color:"var(--text-accent)",fontWeight:600,whiteSpace:"nowrap",textAlign:"right"}}>
                              {opp.value?`R$ ${opp.value.toLocaleString("pt-BR")}`:"—"}
                            </td>
                            {/* CONFIDENCE */}
                            <td style={{padding:"7px 9px"}}>
                              <span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:(stage?.color||"#888")+"22",color:stage?.color||"#888",fontWeight:700}}>{confPct}</span>
                            </td>
                            {/* FOLLOW-UP */}
                            <td style={{padding:"7px 9px",color:"var(--text-secondary)",fontSize:"11px",maxWidth:"200px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{opp.nextAction||"—"}</td>
                            {/* CONTATOS */}
                            <td style={{padding:"7px 9px",color:"var(--text-secondary)",fontSize:"11px",whiteSpace:"nowrap"}}>{opp.contact||"—"}</td>
                            {/* Actions */}
                            <td style={{padding:"7px 9px"}}>
                              <button onClick={e=>{e.stopPropagation();openAI(opp);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"13px",padding:"2px"}} title="IA">⚡</button>
                            </td>
                          </tr>
                        );
                      });
                    })()}
                  </tbody>
                </table>
                {opps.length===0 && <div style={{textAlign:"center",padding:"30px 0",color:"var(--text-muted)",fontSize:"13px"}}>Nenhuma oportunidade cadastrada</div>}
              </div>
            )}
          </div>
        )}

        {/* FUNIL */}
        {view==="dashboard" && (
          <div style={{flex:1}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:"8px",marginBottom:"14px"}}>
              {STAGES.map(s=>{
                const count = opps.filter(o=>o.stage===s.id).length;
                const val   = opps.filter(o=>o.stage===s.id).reduce((a,o)=>a+o.value,0);
                const pct   = totalVal>0?Math.round(val/totalVal*100):0;
                return (
                  <div key={s.id} style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"12px",borderTop:`3px solid ${s.color}`}}>
                    <div style={{fontSize:"10px",color:"#bbb",marginBottom:"4px"}}>{s.tag} · {s.label}</div>
                    <div style={{fontSize:"22px",fontWeight:600,marginBottom:"2px",color:"var(--text-primary)"}}>{count}</div>
                    <div style={{fontSize:"11px",color:"var(--text-secondary)"}}>R$ {(val/1000).toFixed(0)}k · {pct}%</div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"14px"}}>
              <div style={{fontSize:"12px",fontWeight:600,marginBottom:"10px",color:"var(--text-primary)"}}>Todas as oportunidades</div>
              {[...opps].sort((a,b)=>b.value-a.value).map(opp=>(
                <div key={opp.id} onClick={()=>{setSel(opp);setView("kanban");}} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 0",borderBottom:"1px solid var(--border2)",cursor:"pointer"}}>
                  <div style={{width:"8px",height:"8px",borderRadius:"50%",background:STAGES.find(s=>s.id===opp.stage)?.color,flexShrink:0}}/>
                  <span style={{fontSize:"12px",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{opp.title}</span>
                  <span style={{fontSize:"11px",color:"var(--text-secondary)",minWidth:"72px",flexShrink:0}}>{opp.company}</span>
                  <span style={{fontSize:"12px",fontWeight:600,minWidth:"54px",textAlign:"right",flexShrink:0,color:"var(--text-primary)"}}>R$ {(opp.value/1000).toFixed(0)}k</span>
                  <span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:PRI_BG[opp.priority],color:PRI_TXT[opp.priority],flexShrink:0}}>{opp.priority}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* FOLLOW-UPS */}
        {view==="tasks" && (
          <div style={{flex:1}}>
            <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"14px"}}>
              <div style={{fontSize:"12px",fontWeight:600,marginBottom:"12px",color:"var(--text-primary)"}}>Follow-ups por data</div>
              {[...opps].filter(o=>o.nextAction).sort((a,b)=>(a.nextDate||"9999")>(b.nextDate||"9999")?1:-1).map(opp=>{
                const late = opp.nextDate&&opp.nextDate<today;
                const stg  = STAGES.find(s=>s.id===opp.stage);
                return (
                  <div key={opp.id} onClick={()=>{setSel(opp);setView("kanban");}} style={{display:"flex",gap:"12px",padding:"10px 0",borderBottom:"1px solid var(--border2)",cursor:"pointer",alignItems:"flex-start"}}>
                    <div style={{minWidth:"74px",fontSize:"11px",color:late?"#FF7777":"#5A5050",fontWeight:late?600:400}}>{opp.nextDate||"—"}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:"12px",fontWeight:600,marginBottom:"2px",color:"var(--text-primary)"}}>{opp.nextAction}</div>
                      <div style={{fontSize:"11px",color:"var(--text-secondary)"}}>{opp.company} · {opp.title}</div>
                    </div>
                    <span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:stg?.color+"22",color:stg?.color,fontWeight:600,flexShrink:0}}>{stg?.tag}</span>
                    <span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"8px",background:PRI_BG[opp.priority],color:PRI_TXT[opp.priority],flexShrink:0}}>{opp.priority}</span>
                  </div>
                );
              })}
              {opps.filter(o=>o.nextAction).length===0 && <div style={{fontSize:"13px",color:"#bbb",textAlign:"center",padding:"20px 0"}}>Nenhum follow-up cadastrado</div>}
            </div>
          </div>
        )}

  
        {/* ===== PERFIL ===== */}
        {view==="perfil" && (
          <div style={{flex:1,maxWidth:"600px"}}>
            <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"20px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}}>
                <div style={{fontSize:"14px",fontWeight:600,color:"var(--text-primary)"}}>Perfil e Configurações</div>
                {!profileEdit && <button onClick={()=>{setProfileDraft({...profile});setProfileEdit(true);}} style={{padding:"5px 14px",fontSize:"12px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer"}}>Editar</button>}
              </div>
              {!profileEdit ? (
                <div>
                  <div style={{display:"flex",gap:"16px",alignItems:"center",marginBottom:"18px"}}>
                    <div style={{width:"64px",height:"64px",borderRadius:"50%",background:"#8C1A1A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",fontWeight:700,color:"#FFD0D0",flexShrink:0}}>
                      {profile.photo ? <img src={profile.photo} style={{width:"64px",height:"64px",borderRadius:"50%",objectFit:"cover"}} alt="foto"/> : (profile.userName||"U").split(" ").map(w=>w[0]).slice(0,2).join("")}
                    </div>
                    <div>
                      <div style={{fontSize:"16px",fontWeight:700,color:"var(--text-primary)"}}>{profile.userName||"—"}</div>
                      <div style={{fontSize:"12px",color:"var(--text-accent)"}}>{profile.role||"—"}</div>
                      <div style={{fontSize:"12px",color:"var(--text-secondary)"}}>{profile.companyName||"—"}</div>
                    </div>
                  </div>
                  {[["E-mail",profile.email],["Telefone",profile.phone],["LinkedIn",profile.linkedin],["Região",profile.region]].map(([k,v])=>(
                    <div key={k} style={{display:"flex",gap:"12px",padding:"7px 0",borderBottom:"1px solid var(--border2)"}}>
                      <span style={{fontSize:"12px",color:"var(--text-secondary)",width:"80px",flexShrink:0}}>{k}</span>
                      <span style={{fontSize:"12px",color:"var(--text-primary)"}}>{v||"—"}</span>
                    </div>
                  ))}
                </div>
              ) : (
                <div>
                  {[["companyName","Empresa"],["userName","Nome"],["role","Cargo"],["email","E-mail"],["phone","Telefone"],["linkedin","LinkedIn"],["region","Região"]].map(([k,label])=>(
                    <div key={k} style={{marginBottom:"10px"}}>
                      <label style={lbl}>{label}</label>
                      <input value={profileDraft[k]||""} onChange={e=>setProfileDraft({...profileDraft,[k]:e.target.value})} style={inp}/>
                    </div>
                  ))}
                  <div style={{marginBottom:"10px"}}>
                    <label style={lbl}>Foto (URL ou base64)</label>
                    <input value={profileDraft.photo||""} onChange={e=>setProfileDraft({...profileDraft,photo:e.target.value})} style={inp} placeholder="https://... ou cole base64"/>
                  </div>
                  <div style={{display:"flex",gap:"8px",marginTop:"14px"}}>
                    <button onClick={()=>saveProfile(profileDraft)} style={{flex:1,padding:"9px",fontSize:"13px",borderRadius:"6px",border:"none",background:"#8C1A1A",color:"#FFD0D0",cursor:"pointer",fontWeight:600}}>Salvar</button>
                    <button onClick={()=>setProfileEdit(false)} style={{padding:"9px 16px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ===== BUDGET ===== */}
        {view==="budget" && (
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
              <div style={{fontSize:"14px",fontWeight:600,color:"var(--text-primary)"}}>Budget {new Date().getFullYear()}</div>
              <button onClick={()=>setBudgetModal(true)} style={{padding:"5px 14px",fontSize:"12px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer"}}>+ Adicionar meta</button>
            </div>
            {/* Summary cards */}
            {(()=>{
              const tot   = budgets.reduce((s,b)=>s+b.target,0);
              const real  = budgets.reduce((s,b)=>s+b.realized,0);
              const pct   = tot>0?Math.round(real/tot*100):0;
              return (
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",marginBottom:"14px"}}>
                  {[["Meta total","R$ "+tot.toLocaleString("pt-BR"),"#E6F1FB","#0C447C"],["Realizado","R$ "+real.toLocaleString("pt-BR"),"#EAF3DE","#27500A"],["Atingimento",pct+"%",pct>=80?"#EAF3DE":pct>=50?"#FAEEDA":"#FCEBEB",pct>=80?"#27500A":pct>=50?"#633806":"#791F1F"]].map(([l,v,bg,tc])=>(
                    <div key={l} style={{background:bg,borderRadius:"8px",padding:"10px 12px"}}>
                      <div style={{fontSize:"10px",color:tc,opacity:.7,marginBottom:"4px"}}>{l}</div>
                      <div style={{fontSize:"16px",fontWeight:700,color:tc}}>{v}</div>
                    </div>
                  ))}
                </div>
              );
            })()}
            <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
                <thead><tr style={{background:"var(--bg-card2)"}}>
                  {["Cliente","Fornecedor","Meta","Realizado","% Ating.","Ano",""].map(h=>(
                    <th key={h} style={{padding:"8px 10px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:"10px",borderBottom:"1px solid var(--border2)"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {budgets.length===0 && <tr><td colSpan={7} style={{padding:"20px",textAlign:"center",color:"var(--text-muted)",fontSize:"12px"}}>Nenhuma meta cadastrada</td></tr>}
                  {budgets.map(b=>{
                    const pct=b.target>0?Math.round(b.realized/b.target*100):0;
                    const pc=pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";
                    return (
                      <tr key={b.id} style={{borderBottom:"1px solid var(--border2)"}}>
                        <td style={{padding:"8px 10px",color:"var(--text-primary)",fontWeight:600}}>{b.client}</td>
                        <td style={{padding:"8px 10px",color:"var(--text-secondary)"}}>{b.supplier||"—"}</td>
                        <td style={{padding:"8px 10px",color:"var(--text-accent)"}}>R$ {b.target.toLocaleString("pt-BR")}</td>
                        <td style={{padding:"8px 10px",color:"var(--text-green)"}}>R$ {b.realized.toLocaleString("pt-BR")}</td>
                        <td style={{padding:"8px 10px"}}><span style={{color:pc,fontWeight:700}}>{pct}%</span></td>
                        <td style={{padding:"8px 10px",color:"var(--text-secondary)"}}>{b.year}</td>
                        <td style={{padding:"8px 10px"}}><button onClick={()=>delBudget(b.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#5A3030",fontSize:"13px"}}>✕</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {budgetModal && (
              <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>

                  <div style={{fontSize:"14px",fontWeight:600,marginBottom:"14px",color:"var(--text-primary)"}}>Nova meta de budget</div>
                  {[["client","Cliente *","text"],["supplier","Fornecedor","text"],["target","Meta (R$)","number"],["realized","Realizado (R$)","number"],["year","Ano","number"]].map(([k,lbl,t])=>(
                    <div key={k} style={{marginBottom:"8px"}}>
                      <label style={{fontSize:"10px",color:"var(--text-secondary)",display:"block",marginBottom:"3px"}}>{lbl}</label>
                      <input type={t} value={budgetForm[k]||""} onChange={e=>setBudgetForm({...budgetForm,[k]:e.target.value})} style={inp}/>
                    </div>
                  ))}
                  <div style={{marginBottom:"10px"}}>
                    <label style={{fontSize:"10px",color:"var(--text-secondary)",display:"block",marginBottom:"3px"}}>Notas</label>
                    <textarea value={budgetForm.notes||""} onChange={e=>setBudgetForm({...budgetForm,notes:e.target.value})} style={{...inp,height:"52px"}}/>

                    <button onClick={()=>setProjModal(false)} style={{padding:"9px 14px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* PAINEL DETALHE */}
        {sel && (
          <div style={{width:"272px",flexShrink:0,background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"8px",padding:"14px",position:"sticky",top:"60px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
              <div style={{flex:1,paddingRight:"8px"}}>
                <div style={{fontSize:"13px",fontWeight:600,marginBottom:"2px",lineHeight:1.3,color:"var(--text-primary)"}}>{sel.title}</div>
                <div style={{fontSize:"11px",color:"var(--text-secondary)"}}>{sel.company} · {sel.contact}</div>
              </div>
              <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-muted)",fontSize:"16px",lineHeight:1,padding:0}}>✕</button>
            </div>
            <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"10px"}}>
              <span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"10px",background:"rgba(140,26,26,0.25)",color:"var(--text-accent)",fontWeight:600}}>R$ {(sel.value||0).toLocaleString("pt-BR")}</span>
              <span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"10px",background:PRI_BG[sel.priority],color:PRI_TXT[sel.priority],fontWeight:600}}>{sel.priority}</span>
              <span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"10px",background:(STAGES.find(s=>s.id===sel.stage)?.color||"#888")+"22",color:STAGES.find(s=>s.id===sel.stage)?.color,fontWeight:600}}>{STAGES.find(s=>s.id===sel.stage)?.label}</span>
            </div>
            <div style={{display:"flex",gap:"5px",marginBottom:"12px"}}>
              <button onClick={()=>move(sel.id,-1)} style={{flex:1,padding:"5px",fontSize:"11px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",cursor:"pointer",color:"var(--text-secondary)"}}>← Recuar</button>
              <button onClick={()=>move(sel.id,1)} style={{flex:1,padding:"5px",fontSize:"11px",borderRadius:"6px",border:"1px solid #8C1A1A",background:"rgba(140,26,26,0.25)",cursor:"pointer",color:"var(--text-accent)",fontWeight:600}}>Avançar →</button>
            </div>
            <div style={{marginBottom:"8px"}}>
              <label style={lbl}>Fornecedor</label>
              <input value={sel.supplier||""} onChange={e=>updateOpp({...sel,supplier:e.target.value})} style={inp}/>
            </div>
            <div style={{marginBottom:"8px"}}>
              <label style={lbl}>Cor forecast</label>
              <div style={{display:"flex",gap:"4px"}}>
                {[["none","—","#888"],["yellow","🟡","#EF9F27"],["red","🔴","#E24B4A"],["gray","⚫","#888780"]].map(([v,l,c])=>(
                  <button key={v} onClick={()=>updateOpp({...sel,forecastColor:v})} style={{flex:1,padding:"4px",fontSize:"11px",borderRadius:"6px",border:`1px solid ${(sel.forecastColor||"none")===v?c:"var(--border)"}`,background:(sel.forecastColor||"none")===v?c+"33":"transparent",color:(sel.forecastColor||"none")===v?c:"var(--text-secondary)",cursor:"pointer"}}>{l}</button>
                ))}
              </div>
            </div>
            {[
              {label:"Próxima ação",     key:"nextAction", type:"textarea"},
              {label:"Data follow-up",   key:"nextDate",   type:"date"},
              {label:"Valor R$",         key:"value",      type:"number"},
              {label:"Notas",            key:"notes",      type:"textarea"},
            ].map(f=>(
              <div key={f.key} style={{marginBottom:"8px"}}>
                <label style={lbl}>{f.label}</label>
                {f.type==="textarea"
                  ? <textarea value={sel[f.key]||""} onChange={e=>updateOpp({...sel,[f.key]:e.target.value})} style={{...inp,height:f.key==="notes"?"72px":"46px"}}/>
                  : <input type={f.type} value={sel[f.key]||""} onChange={e=>updateOpp({...sel,[f.key]:f.type==="number"?Number(e.target.value):e.target.value})} style={inp}/>
                }
              </div>
            ))}
            <div style={{marginBottom:"10px"}}>
              <label style={lbl}>Prioridade</label>
              <div style={{display:"flex",gap:"4px"}}>
                {["alta","media","baixa"].map(p=>(
                  <button key={p} onClick={()=>updateOpp({...sel,priority:p})} style={{flex:1,padding:"5px",fontSize:"11px",borderRadius:"6px",border:`1px solid ${sel.priority===p?PRI_TXT[p]:"#ddd"}`,background:sel.priority===p?"rgba(140,26,26,0.25)":"transparent",color:sel.priority===p?"#FFAAAA":"#7A7070",cursor:"pointer",fontWeight:sel.priority===p?600:400,textTransform:"capitalize"}}>{p}</button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:"5px"}}>
              <button onClick={()=>openAI(`Analise a oportunidade "${sel.title}" da ${sel.company} na etapa ${STAGES.find(s=>s.id===sel.stage)?.label}. Próximos passos com 3S+M?`)} style={{flex:1,padding:"7px",fontSize:"11px",borderRadius:"6px",border:"1px solid #6B3A3A",background:"rgba(140,26,26,0.2)",color:"var(--text-accent)",cursor:"pointer",fontWeight:600}}>Analisar com IA</button>
              <button onClick={()=>delOpp(sel.id)} style={{padding:"7px 10px",fontSize:"11px",borderRadius:"6px",border:"1px solid #5A2A2A",background:"rgba(80,20,20,0.3)",color:"#FF9090",cursor:"pointer"}}>Excluir</button>
            </div>
          </div>
        )}
      </div>

      {/* PAINEL IA */}
      {aiOpen && (
        <div style={{position:"fixed",bottom:0,right:"16px",width:"330px",background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"12px 12px 0 0",display:"flex",flexDirection:"column",maxHeight:"480px",boxShadow:"0 -4px 24px rgba(0,0,0,0.09)",zIndex:50}}>
          <div style={{padding:"10px 14px",borderBottom:"1px solid #333",display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
            <div style={{width:"24px",height:"24px",borderRadius:"50%",background:"#8C1A1A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:"#fff",fontWeight:600,flexShrink:0}}>IA</div>
            <span style={{fontSize:"13px",fontWeight:600,flex:1,color:"var(--text-primary)"}}>Gestor IA · 3S+M</span>
            {sel && <span style={{fontSize:"11px",color:"#bbb",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"80px"}}>{sel.company}</span>}
            <button onClick={()=>setAiOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#bbb",fontSize:"16px",lineHeight:1}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px",display:"flex",flexDirection:"column",gap:"8px",background:"var(--bg-card2)"}}>
            {aiMsgs.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"88%",padding:"8px 11px",borderRadius:m.role==="user"?"10px 10px 0 10px":"10px 10px 10px 0",background:m.role==="user"?"rgba(140,26,26,0.3)":"#2A2A2A",fontSize:"12px",lineHeight:1.55,color:m.role==="user"?"#FFBBBB":"#D0C0C0",whiteSpace:"pre-wrap"}}>{m.content}</div>
              </div>
            ))}
            {aiLoading && <div style={{display:"flex"}}><div style={{padding:"8px 12px",borderRadius:"10px 10px 10px 0",background:"var(--bg-header)",fontSize:"12px",color:"var(--text-secondary)"}}>Analisando...</div></div>}
            <div ref={aiEnd}/>
          </div>
          <div style={{padding:"6px 8px 4px",borderTop:"1px solid #333",display:"flex",flexWrap:"wrap",gap:"4px",flexShrink:0}}>
            {["Próximo passo 3S+M","Argumento NOMUDA","Plano 5W2H","Kaizen para este cliente","Risco de perda"].map(q=>(
              <button key={q} onClick={()=>chat(q)} style={{fontSize:"10px",padding:"3px 8px",borderRadius:"10px",border:"1px solid var(--border)",background:"transparent",cursor:"pointer",color:"var(--text-secondary)"}}>{q}</button>
            ))}
          </div>
          <div style={{padding:"6px 8px 8px",display:"flex",gap:"6px",flexShrink:0,background:"#252525"}}>
            <input value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&chat()} placeholder="Pergunte ao gestor IA..." style={{flex:1,fontSize:"12px",padding:"7px 10px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--bg-input)",color:"var(--text-primary)"}}/>
            <button onClick={()=>chat()} disabled={aiLoading} style={{padding:"7px 14px",fontSize:"13px",borderRadius:"6px",border:"none",background:aiLoading?"#5A2A2A":"#8C1A1A",color:aiLoading?"#7A5050":"#FFDDDD",cursor:aiLoading?"default":"pointer",fontWeight:600}}>→</button>
          </div>
        </div>
      )}

      {/* MODAL API KEY */}
      {showKey && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:"12px",padding:"20px",width:"380px",maxWidth:"90vw",border:"1px solid #e8e8e8"}}>
            <div style={{fontSize:"14px",fontWeight:600,marginBottom:"8px",color:"var(--text-primary)"}}>Chave da API Anthropic</div>
            <p style={{fontSize:"12px",color:"var(--text-secondary)",marginBottom:"14px",lineHeight:1.6}}>Necessária para o Gestor IA funcionar. Obtenha em{" "}
              <a href="https://console.anthropic.com" target="_blank" style={{color:"#185FA5"}}>console.anthropic.com</a>.
              {" "}A chave fica salva apenas neste navegador, nunca é enviada para terceiros.
            </p>
            <label style={lbl}>API Key (começa com sk-ant-...)</label>
            <input type="password" value={keyDraft} onChange={e=>setKeyDraft(e.target.value)} placeholder="sk-ant-api03-..." style={{...inp,marginBottom:"12px",fontSize:"13px"}}/>
            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={saveKey} style={{flex:1,padding:"9px",fontSize:"13px",borderRadius:"6px",border:"none",background:"#8C1A1A",color:"#FFD0D0",cursor:"pointer",fontWeight:600}}>Salvar</button>
              <button onClick={()=>setShowKey(false)} style={{padding:"9px 16px",fontSize:"13px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--text-secondary)",cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL NOVA OPORTUNIDADE */}
      {newModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:"16px"}}>
          <div style={{background:"#252525",borderRadius:"12px",border:"1px solid var(--border)",padding:"18px",width:"360px",maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
              <span style={{fontSize:"14px",fontWeight:600,color:"var(--text-primary)"}}>Nova oportunidade</span>
              <button onClick={()=>setNewModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#bbb",fontSize:"16px"}}>✕</button>
            </div>
            {[
              {l:"Título / produto *",  k:"title",      t:"text"},
              {l:"Empresa (Customer) *",k:"company",    t:"text"},
              {l:"Fornecedor (Supplier)",k:"supplier",  t:"text"},
              {l:"Responsável (RESP.)", k:"resp",       t:"text"},
              {l:"Contato / decisor",   k:"contact",    t:"text"},
              {l:"Valor estimado R$",   k:"value",      t:"number"},
              {l:"Próxima ação / follow-up", k:"nextAction", t:"text"},
              {l:"Data do follow-up",   k:"nextDate",   t:"date"},
            ].map(f=>(
              <div key={f.k} style={{marginBottom:"8px"}}>
                <label style={lbl}>{f.l}</label>
                <input type={f.t} value={form[f.k]} onChange={e=>setForm({...form,[f.k]:e.target.value})} style={inp}/>
              </div>
            ))}
            <div style={{marginBottom:"8px"}}>
              <label style={lbl}>Notas</label>
              <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={{...inp,height:"56px"}}/>
            </div>
            <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
              <div style={{flex:1}}>
                <label style={lbl}>Etapa inicial</label>
                <select value={form.stage} onChange={e=>setForm({...form,stage:e.target.value})} style={inp}>
                  {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                </select>
              </div>
              <div style={{flex:1}}>
                <label style={lbl}>Prioridade</label>
                <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})} style={inp}>
                  <option value="alta">Alta</option>
                  <option value="media">Média</option>
                  <option value="baixa">Baixa</option>
                </select>
              </div>
            </div>
            <div style={{marginBottom:"12px"}}>
              <label style={lbl}>Cor forecast</label>
              <div style={{display:"flex",gap:"6px",marginTop:"4px"}}>
                {[["none","— Padrão","#888"],["yellow","🟡 Devemos ao cliente","#EF9F27"],["red","🔴 Negociação ativa","#E24B4A"],["gray","⚫ Perdido","#888780"]].map(([v,l,c])=>(
                  <button key={v} onClick={()=>setForm({...form,forecastColor:v})} style={{flex:1,padding:"5px 4px",fontSize:"10px",borderRadius:"6px",border:`1px solid ${form.forecastColor===v?c:"var(--border)"}`,background:form.forecastColor===v?c+"22":"transparent",color:form.forecastColor===v?c:"var(--text-secondary)",cursor:"pointer",fontWeight:form.forecastColor===v?700:400}}>{l}</button>
                ))}
              </div>
            </div>
            <button onClick={addOpp} disabled={!form.title||!form.company}
              style={{width:"100%",padding:"10px",fontSize:"13px",borderRadius:"6px",border:"none",background:form.title&&form.company?"#8C1A1A":"#4A2A2A",color:form.title&&form.company?"#FFD0D0":"#7A5050",cursor:form.title&&form.company?"pointer":"default",fontWeight:600}}>
              Criar oportunidade
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
