<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FORECAST-CRM · 3S+M</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background .25s,color .25s}
    input,select,textarea,button{font-family:inherit}
    textarea{resize:vertical}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{border-radius:3px}
    body.theme-dark{
      --bg-app:#1a1a1a;--bg-header:#2A2A2A;--bg-card:#252525;--bg-card2:#1E1E1E;
      --bg-input:#1a1a1a;--border:#3A3A3A;--border2:#2E2E2E;
      --text-primary:#F0EDED;--text-secondary:#A09090;--text-muted:#5A5050;
      --text-accent:#FFAAAA;--text-green:#9FE1CB;--text-blue:#85B7EB;
      --sinuelo:#8C1A1A;--sinuelo-light:rgba(140,26,26,0.25);--sinuelo-text:#FFAAAA;
      --scrollbar:#444;
    }
    body.theme-light{
      --bg-app:#f0eeea;--bg-header:#ffffff;--bg-card:#ffffff;--bg-card2:#f7f5f2;
      --bg-input:#f7f5f2;--border:#e0ddd8;--border2:#ece9e4;
      --text-primary:#1a1a1a;--text-secondary:#6b6560;--text-muted:#b0aaa4;
      --text-accent:#8C1A1A;--text-green:#0F6E56;--text-blue:#185FA5;
      --sinuelo:#8C1A1A;--sinuelo-light:rgba(140,26,26,0.10);--sinuelo-text:#8C1A1A;
      --scrollbar:#ccc;
    }
    body{background:var(--bg-app);color:var(--text-primary)}
    ::-webkit-scrollbar-thumb{background:var(--scrollbar)}
  </style>
</head>
<body class="theme-light">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STAGES = [
  { id:"prospeccao",   label:"Prospecção",   tag:"S1",   color:"var(--text-secondary)" },
  { id:"qualificacao", label:"Qualificação",  tag:"S2",   color:"#FF9090" },
  { id:"diagnostico",  label:"Diagnóstico",   tag:"S2+",  color:"#378ADD" },
  { id:"proposta",     label:"Proposta",      tag:"S3",   color:"#BA7517" },
  { id:"negociacao",   label:"Negociação",    tag:"NEG",  color:"#D85A30" },
  { id:"fechamento",   label:"Fechamento",    tag:"FECH", color:"#639922" },
  { id:"pos_venda",    label:"Pós-Venda",     tag:"M",    color:"#0F6E56" },
];

const STORAGE_KEY = "crm_industrial_v2";
const DEMO = [{"id": "1700000001", "title": "Multiplicador HT3 - 1000 + Tor. Pro 200 - 1504", "company": "Arcelormittal", "supplier": "Norbar", "contact": "Rafael Martins", "resp": "Elieser", "value": 0, "stage": "qualificacao", "priority": "baixa", "negType": "D", "forecastColor": "none", "nextAction": "15.04.26 - Verificar torque processo", "nextDate": "", "notes": "15.04.26 - Verificar torque processo\n01.04.26 - Primeira visita - oportunidade", "months": {"m1": true}, "history": [], "visitHistory": [], "createdAt": "2026-03-01"}];

function loadData() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

function App() {
  // ── TODOS OS HOOKS NO TOPO (Ordem garantida) ──
  const [opps, setOpps] = useState(() => loadData() || DEMO);
  const [view, setView] = useState("kanban");
  const [theme, setTheme] = useState("light");
  const [sel, setSel] = useState(null);
  const [newModal, setNewModal] = useState(false);

  useEffect(() => { 
    saveData(opps); 
    document.body.className = theme === 'light' ? 'theme-light' : 'theme-dark';
  }, [opps, theme]);

  const today = new Date().toISOString().slice(0,10);

  return (
    <div style={{minHeight:"100vh", padding:"20px"}}>
      {/* HEADER */}
      <div style={{background:"var(--bg-header)", padding:"16px", borderRadius:"12px", border:"1px solid var(--border)", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px"}}>
        <div style={{display:"flex", alignItems:"center", gap:"12px"}}>
          <div style={{width:"40px", height:"40px", background:"#8C1A1A", borderRadius:"8px", display:"flex", alignItems:"center", justifyContent:"center"}}>
            <span style={{color:"#fff", fontWeight:"bold"}}>F</span>
          </div>
          <h2 style={{margin:0, color:"var(--text-primary)", fontSize:"18px"}}>FORECAST-CRM</h2>
        </div>
        
        <div style={{display:"flex", gap:"10px"}}>
          <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} style={{padding:"8px", borderRadius:"8px", border:"1px solid var(--border)", background:"var(--bg-card)", cursor:"pointer"}}>
            {theme === 'light' ? '🌙' : '☀️'}
          </button>
          <button onClick={() => setView("kanban")} style={{padding:"8px 16px", borderRadius:"8px", border:"1px solid var(--border)", background: view==="kanban" ? "#8C1A1A" : "var(--bg-card)", color: view==="kanban" ? "#fff" : "var(--text-primary)", cursor:"pointer"}}>Kanban</button>
          <button onClick={() => setView("tabela")} style={{padding:"8px 16px", borderRadius:"8px", border:"1px solid var(--border)", background: view==="tabela" ? "#8C1A1A" : "var(--bg-card)", color: view==="tabela" ? "#fff" : "var(--text-primary)", cursor:"pointer"}}>Tabela</button>
        </div>
      </div>

      {/* DASHBOARD SIMPLES */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:"15px", marginBottom:"20px"}}>
        {STAGES.map(s => (
          <div key={s.id} style={{background:"var(--bg-card)", padding:"15px", borderRadius:"10px", borderBottom:`4px solid ${s.color}`}}>
            <div style={{fontSize:"12px", color:"var(--text-muted)"}}>{s.label}</div>
            <div style={{fontSize:"20px", fontWeight:"bold", marginTop:"5px"}}>
              {opps.filter(o => o.stage === s.id).length}
            </div>
          </div>
        ))}
      </div>

      {/* ÁREA DE CONTEÚDO */}
      <div style={{background:"var(--bg-card)", padding:"20px", borderRadius:"12px", border:"1px solid var(--border)", minHeight:"400px"}}>
        <p style={{color:"var(--text-secondary)"}}>
          Aplicativo carregado em modo direto. O login foi desativado conforme solicitado.
        </p>
        <div style={{marginTop:"20px", display:"flex", flexWrap:"wrap", gap:"10px"}}>
          {opps.map(o => (
            <div key={o.id} style={{padding:"15px", border:"1px solid var(--border)", borderRadius:"8px", width:"250px"}}>
              <div style={{fontWeight:"bold", fontSize:"14px"}}>{o.title}</div>
              <div style={{fontSize:"12px", color:"var(--text-muted)", marginTop:"5px"}}>{o.company}</div>
              <div style={{display:"inline-block", marginTop:"10px", padding:"2px 8px", borderRadius:"4px", fontSize:"10px", background:"var(--sinuelo-light)", color:"var(--sinuelo-text)"}}>
                {o.stage.toUpperCase()}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
